<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>별모아 별자리 V3</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: linear-gradient(180deg, #0b1029 0%, #1a1f4b 100%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    user-select: none;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    /* 모바일 dynamic viewport (주소바 변동 대응) */
    min-height: 100dvh;
    padding: 8px;
  }
  .game-wrap {
    /* 헤더(80) + 진행바(50) + 헬바(50) + 푸터(70) + 패딩/간격 ≈ 280px 제외 */
    width: min(400px, 100vw - 16px, calc((100dvh - 280px) * 400 / 600));
    display: flex; flex-direction: column; gap: 6px;
  }
  .header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    backdrop-filter: blur(6px);
  }
  .score-block { display: flex; flex-direction: column; }
  .score-block .label { font-size: 13px; opacity: 0.7; }
  .score-block .value { font-size: 24px; font-weight: 700; color: #FFD700; }
  .score-block.best .value { color: #87CEFA; font-size: 18px; }
  .next-block {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(0,0,0,0.3);
    padding: 4px 10px; border-radius: 8px;
    min-width: 70px;
  }
  .next-block .label { font-size: 12px; opacity: 0.7; }
  .next-block canvas { width: 36px; height: 36px; }
  .next-block .name { font-size: 12px; }

  .canvas-container {
    position: relative;
    width: 100%;
    aspect-ratio: 400 / 600;
    background: rgba(0,0,0,0.35);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(120, 130, 255, 0.25);
    transition: box-shadow 0.2s;
  }
  .canvas-container.danger {
    box-shadow: 0 0 40px rgba(255, 60, 60, 0.7), inset 0 0 30px rgba(255, 0, 0, 0.3);
  }
  .canvas-container.paused::after {
    content: '⏸ PAUSED';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700;
    background: rgba(0,0,0,0.6);
    z-index: 5;
  }
  canvas#gameCanvas { display: block; width: 100%; height: 100%; }

  .combo-toast {
    position: absolute; top: 92px; left: 50%;
    transform: translateX(-50%);
    font-size: 23px; font-weight: 900;
    color: #FFD700;
    text-shadow: 0 0 10px rgba(255,215,0,0.8), 0 0 20px rgba(255,140,0,0.5);
    opacity: 0; pointer-events: none;
    z-index: 4;
    white-space: nowrap; letter-spacing: 0.5px;
    max-width: 96%;
    text-align: center; line-height: 1.05;
  }
  .combo-toast.show { animation: comboPop 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
  /* 콤보 숫자 강조 (펀치) */
  .combo-toast .combo-num {
    display: inline-block;
    font-size: 1.55em; vertical-align: -0.05em; margin-right: 3px;
    animation: comboNumPunch 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .combo-toast .combo-mult { display: block; font-size: 0.68em; opacity: 0.9; margin-top: 3px; color: #fff; }
  /* 단계별 색/크기 강조 — 3콤보부터 시작, 6, 8+ */
  .combo-toast.combo-c1 {            /* 3~5콤보: 주황 */
    color: #FF8C00; font-size: 26px;
    text-shadow: 0 0 12px rgba(255,140,0,0.9), 0 0 24px rgba(255,90,0,0.55);
  }
  .combo-toast.combo-c1 .combo-num { font-size: 1.6em; }
  .combo-toast.combo-c2 {            /* 6~7콤보: 주홍, 더 큼 */
    color: #FF4500; font-size: 29px;
    text-shadow: 0 0 13px rgba(255,69,0,1), 0 0 28px rgba(255,30,0,0.6);
  }
  .combo-toast.combo-c2 .combo-num { font-size: 1.72em; }
  .combo-toast.combo-c3 {            /* 8+콤보: 핑크, 최대 강조 */
    color: #FF1493; font-size: 32px;
    text-shadow: 0 0 14px rgba(255,20,147,1), 0 0 30px rgba(156,39,176,0.75), 0 0 46px rgba(255,90,0,0.5);
  }
  .combo-toast.combo-c3 .combo-num {
    font-size: 1.8em;
    animation: comboNumPunchBig 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .combo-toast.combo-c3.show { animation: comboPopBig 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
  @keyframes comboPop {
    0%   { transform: translateX(-50%) scale(0.3) rotate(-7deg); opacity: 0; }
    20%  { transform: translateX(-50%) scale(1.28) rotate(3deg); opacity: 1; }
    40%  { transform: translateX(-50%) scale(0.94) rotate(0deg); opacity: 1; }
    55%  { transform: translateX(-50%) scale(1.08); opacity: 1; }
    72%  { transform: translateX(-50%) scale(1.0);  opacity: 1; }
    100% { transform: translateX(-50%) translateY(-36px) scale(0.9); opacity: 0; }
  }
  /* 8+콤보 전용 더 강한 펀치 */
  @keyframes comboPopBig {
    0%   { transform: translateX(-50%) scale(0.3) rotate(-9deg); opacity: 0; }
    18%  { transform: translateX(-50%) scale(1.42) rotate(4deg); opacity: 1; }
    38%  { transform: translateX(-50%) scale(0.9) rotate(0deg);  opacity: 1; }
    54%  { transform: translateX(-50%) scale(1.13); opacity: 1; }
    70%  { transform: translateX(-50%) scale(1.0);  opacity: 1; }
    100% { transform: translateX(-50%) translateY(-42px) scale(0.86); opacity: 0; }
  }
  @keyframes comboNumPunch {
    0%   { transform: scale(2.3); filter: brightness(2.2); }
    40%  { transform: scale(0.88); }
    100% { transform: scale(1); filter: brightness(1); }
  }
  @keyframes comboNumPunchBig {
    0%   { transform: scale(2.8); filter: brightness(2.8); }
    40%  { transform: scale(0.83); }
    100% { transform: scale(1); filter: brightness(1); }
  }

  .gameover-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; z-index: 10;
  }
  .gameover-overlay.show { display: flex; }
  .gameover-overlay h2 { font-size: 36px; color: #FF6B6B; }
  .gameover-overlay div { font-size: 16px; }
  .gameover-overlay button {
    padding: 10px 22px; border: none;
    border-radius: 8px; background: #FFD700;
    color: #000; font-weight: 700; cursor: pointer;
  }
  .footer { display: flex; gap: 8px; }
  .item-btn, .pause-btn {
    flex: 1; padding: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    background: linear-gradient(135deg, #4a148c, #1a237e);
    color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.2s;
  }
  .pause-btn { flex: 0 0 80px; background: linear-gradient(135deg, #263238, #455a64); }
  .item-btn:active, .pause-btn:active { transform: scale(0.97); }
  .item-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .item-btn .cd { font-size: 13px; opacity: 0.8; }
  /* 단계 진행 바 */
  .tier-progress {
    display: flex; align-items: center;
    justify-content: center;
    gap: 1px;
    padding: 5px 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    overflow: hidden;
  }
  .tier-cell {
    flex: 0 1 auto;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    border: 1.5px solid rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .tier-cell.unlocked {
    border-color: rgba(255,215,0,0.7);
    box-shadow: 0 0 6px rgba(255,215,0,0.4);
  }
  .tier-cell.current {
    transform: scale(1.2);
    border-color: #FFD700;
    box-shadow: 0 0 10px rgba(255,215,0,0.8);
  }
  .tier-cell .locked-mark {
    font-size: 10px; font-weight: 700;
    color: rgba(255,255,255,0.45);
  }
  .tier-cell canvas { width: 20px; height: 20px; }
  .tier-arrow {
    flex: 0 0 auto;
    font-size: 8px; opacity: 0.5;
    color: #FFD700;
    line-height: 1;
  }

  .item-btn.targeting { background: linear-gradient(135deg, #d32f2f, #b71c1c); animation: pulse 0.8s infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,80,80,0.8); }
    50% { box-shadow: 0 0 0 8px rgba(255,80,80,0); }
  }
  .canvas-container.targeting { cursor: crosshair; }
  .deadline-countdown {
    position: absolute;
    left: 50%; top: 92px;
    transform: translateX(-50%);
    background: rgba(255, 30, 30, 0.85);
    color: #fff;
    font-size: 24px; font-weight: 800;
    padding: 6px 18px;
    border-radius: 22px;
    box-shadow: 0 0 20px rgba(255, 30, 30, 0.7);
    z-index: 6; pointer-events: none;
    display: none;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 6px rgba(0,0,0,0.6);
  }
  .deadline-countdown.show { display: block; animation: pulseRed 0.8s infinite; }
  @keyframes pulseRed {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.1); }
  }
  .canvas-container.targeting::before {
    content: '🌀 제거할 별을 클릭하세요';
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%);
    background: rgba(211,47,47,0.85);
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 700;
    z-index: 6; pointer-events: none;
    white-space: nowrap;
  }

  /* 시작 화면 */
  .start-screen {
    position: fixed; inset: 0;
    background: linear-gradient(180deg, #0b1029 0%, #1a1f4b 50%, #2d1b4e 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    z-index: 100;
    padding: 30px 20px;
    /* 컨텐츠가 뷰포트를 넘으면 스크롤 허용 (티어 hero 추가로 길어질 수 있음) */
    overflow-y: auto;
    overflow-x: hidden;
  }
  /* 자동 마진 트릭: 컨텐츠가 짧으면 위아래 균등하게 채워서 중앙처럼 보이게,
     길면 자연스럽게 위에서부터 흐르고 스크롤 됨 */
  .start-screen .mascot { margin-top: auto; }
  .start-screen .menu-btns { margin-bottom: auto; }
  .start-screen.hidden { display: none; }
  .start-screen .stars-bg {
    position: absolute; inset: 0; pointer-events: none;
  }
  .top-bar {
    position: absolute; top: 16px; right: 16px;
    display: flex; gap: 8px; z-index: 2;
  }
  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1);
    color: #fff; font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s, background 0.2s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.2); }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn.lang { font-size: 12px; font-weight: 700; }

  .mascot {
    font-size: 100px;
    animation: floaty 3s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.6));
    z-index: 2;
  }
  @keyframes floaty {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
  }
  .game-title {
    font-size: 36px; font-weight: 800;
    background: linear-gradient(135deg, #FFD700, #FF6B9D, #87CEFA);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    margin-top: 12px;
    z-index: 2;
  }
  .game-subtitle {
    font-size: 13px; opacity: 0.7;
    margin-bottom: 30px;
    z-index: 2;
  }
  .menu-btns {
    display: flex; flex-direction: column;
    gap: 10px; width: min(280px, 80vw);
    z-index: 2;
  }
  .menu-btn {
    padding: 14px 20px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(74,20,140,0.7), rgba(26,35,126,0.7));
    color: #fff;
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    backdrop-filter: blur(10px);
  }
  .menu-btn:hover { background: linear-gradient(135deg, rgba(94,30,170,0.9), rgba(36,55,156,0.9)); }
  .menu-btn:active { transform: scale(0.97); }
  .menu-btn.primary {
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    color: #1a1a1a;
    font-size: 18px; font-weight: 800;
    border: none;
  }
  .menu-btn.primary:hover {
    background: linear-gradient(135deg, #FFE55C, #FF9D1F);
  }

  /* 모달 */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: linear-gradient(180deg, #1a1f4b, #0b1029);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 24px;
    max-width: 400px; width: 100%;
    max-height: 80vh; overflow-y: auto;
    color: #fff;
  }
  .modal h3 {
    font-size: 24px; margin-bottom: 16px;
    color: #FFD700; text-align: center;
  }
  .modal-content { font-size: 15px; line-height: 1.7; }
  .modal-content p { margin: 8px 0; }
  .modal-content ul { padding-left: 20px; }
  .modal-content li { margin: 4px 0; }
  .modal-close {
    margin-top: 20px; width: 100%;
    padding: 10px;
    border: none; border-radius: 8px;
    background: #FFD700; color: #000;
    font-weight: 700; cursor: pointer;
  }
  .achievement-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px; margin: 4px 0;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
  }
  .achievement-item.unlocked { background: rgba(255,215,0,0.15); border-left: 3px solid #FFD700; }
  .achievement-item .ach-icon { font-size: 28px; }
  .achievement-item .ach-info { flex: 1; }
  .achievement-item .ach-name { font-weight: 700; font-size: 15px; }
  .achievement-item .ach-desc { font-size: 13px; opacity: 0.7; }
  .achievement-item.locked { opacity: 0.5; }
  .stat-row {
    display: flex; justify-content: space-between;
    padding: 8px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .stat-row .stat-label { opacity: 0.8; }
  .stat-row .stat-value { font-weight: 700; color: #FFD700; }

  /* 게임 방법 (간결한 카드/표 형태) */
  .howto-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .howto-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    font-size: 14px;
  }
  .howto-item .ic { font-size: 20px; flex: 0 0 28px; text-align: center; }
  .diff-table {
    width: 100%; border-collapse: collapse;
    font-size: 13px; margin-top: 4px;
  }
  .diff-table th, .diff-table td {
    padding: 8px 4px; text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .diff-table th {
    font-size: 12px; opacity: 0.7;
    background: rgba(255,255,255,0.04);
  }
  .diff-table td:first-child { font-weight: 700; text-align: left; padding-left: 8px; }
  .diff-table .d-easy { color: #90EE90; }
  .diff-table .d-med  { color: #FFD700; }
  .diff-table .d-hard { color: #FF8C00; }
  .diff-table .d-hell { color: #FF1493; }

  /* 난이도 선택 */
  .diff-btn {
    padding: 14px 16px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(74,20,140,0.7), rgba(26,35,126,0.7));
    color: #fff; cursor: pointer;
    text-align: center;
    transition: transform 0.1s, background 0.2s;
  }
  .diff-btn:hover { background: linear-gradient(135deg, rgba(94,30,170,0.9), rgba(36,55,156,0.9)); }
  .diff-btn:active { transform: scale(0.98); }
  .diff-btn .diff-name { font-size: 18px; font-weight: 800; display: block; margin-bottom: 4px; }
  .diff-btn .diff-desc { font-size: 12px; opacity: 0.75; line-height: 1.4; display: block; }
  .diff-btn.easy   .diff-name { color: #90EE90; }
  .diff-btn.medium .diff-name { color: #FFD700; }
  .diff-btn.hard   .diff-name { color: #FF8C00; }
  .diff-btn.hell {
    background: linear-gradient(135deg, #4a0000, #1a0000);
    border-color: #FF1493;
  }
  .diff-btn.hell .diff-name { color: #FF1493; }
  .diff-btn.locked {
    opacity: 0.5;
    cursor: not-allowed;
    background: rgba(50,50,50,0.5);
  }
  .diff-btn.locked:hover { background: rgba(50,50,50,0.5); }

  /* NEXT 큐 */
  .next-block { min-width: 60px; }
  .next-queue { display: flex; gap: 6px; align-items: center; justify-content: center; }
  .next-slot {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(0,0,0,0.3);
    padding: 3px 6px; border-radius: 6px;
  }
  .next-slot canvas { width: 36px; height: 36px; }
  .next-slot .slot-label { font-size: 11px; opacity: 0.7; }

  /* 헬 모드 UI */
  .hell-bar {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: rgba(150,0,0,0.25);
    border: 1px solid rgba(255,20,147,0.4);
    border-radius: 8px;
    font-size: 13px;
  }
  .hell-bar.active { display: flex; }
  .hell-bar { font-size: 14px; }
  .hell-bar .timer-label { opacity: 0.8; font-size: 12px; }
  .hell-bar .timer-value {
    font-weight: 800; color: #FFD700;
    font-variant-numeric: tabular-nums;
  }
  .hell-bar .timer-value.danger { color: #FF1493; animation: blink 0.4s infinite alternate; }
  @keyframes blink { from { opacity: 1; } to { opacity: 0.4; } }
  .hell-bar .warns { margin-left: auto; display: flex; gap: 3px; }
  .hell-bar .warn-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
  }
  .hell-bar .warn-dot.on { background: #FF1493; border-color: #FF1493; box-shadow: 0 0 6px #FF1493; }

  .diff-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px; font-weight: 700;
    margin-left: 8px;
  }
  .diff-badge.easy   { background: #2e7d32; }
  .diff-badge.medium { background: #f9a825; color: #000; }
  .diff-badge.hard   { background: #ef6c00; }
  .diff-badge.hell   { background: #c2185b; box-shadow: 0 0 6px #c2185b; }

  /* 티어/트로피 배지 */
  .tier-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px;
    border-radius: 16px;
    font-weight: 800; font-size: 12px;
    letter-spacing: 0.5px; white-space: nowrap;
  }
  .tier-badge .ti { font-size: 14px; }
  .tier-badge.iron     { background: linear-gradient(135deg, #495057, #868e96); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
  .tier-badge.bronze   { background: linear-gradient(135deg, #7f4f1a, #cd7f32); color: #fff; }
  .tier-badge.silver   { background: linear-gradient(135deg, #8a8a8a, #d8d8d8); color: #1a1a1a; }
  .tier-badge.gold     { background: linear-gradient(135deg, #c89400, #ffd700); color: #1a1a1a; box-shadow: 0 0 6px rgba(255,215,0,0.5); }
  .tier-badge.platinum { background: linear-gradient(135deg, #a8c0c8, #e5f4f8); color: #1a1a1a; box-shadow: 0 0 8px rgba(220,240,255,0.6); }
  .tier-badge.emerald  { background: linear-gradient(135deg, #1e8449, #50c878); color: #fff; box-shadow: 0 0 8px rgba(80,200,120,0.6); }
  .tier-badge.diamond  { background: linear-gradient(135deg, #4dc8e8, #b9f2ff); color: #0a3a4a; box-shadow: 0 0 12px rgba(185,242,255,0.8); }
  .tier-badge.master   {
    background: linear-gradient(135deg, #ff1493, #9c27b0, #4b0082);
    color: #fff;
    box-shadow: 0 0 14px rgba(255,20,147,0.7);
    animation: masterShine 2.5s ease-in-out infinite;
  }
  @keyframes masterShine {
    0%, 100% { box-shadow: 0 0 14px rgba(255,20,147,0.7); }
    50%      { box-shadow: 0 0 26px rgba(255,20,147,1), 0 0 40px rgba(156,39,176,0.6); }
  }

  /* 시작 화면 큰 티어 디스플레이 */
  .tier-hero {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; margin: 10px 0 4px; z-index: 2;
    flex: 0 0 auto; /* flex auto-margin과 충돌 방지 */
  }
  .tier-hero:empty { display: none; } /* 비어있으면 공간 차지 안 함 */
  .tier-hero .tier-badge { font-size: 13px; padding: 5px 14px; border-radius: 18px; }
  .tier-hero .tier-badge .ti { font-size: 16px; }
  .tier-hero .tier-progress-bar {
    width: 200px; height: 6px;
    background: rgba(255,255,255,0.12);
    border-radius: 3px; overflow: hidden;
  }
  .tier-hero .tier-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #FFD700, #FF8C00);
    transition: width 0.4s ease;
  }
  .tier-hero .tier-points-text { font-size: 10px; opacity: 0.7; }

  /* 인게임 헤더 작은 티어 (BEST 점수 위쪽) */
  .header-tier {
    margin-bottom: 4px;
  }
  .header-tier .tier-badge {
    font-size: 10px;
    padding: 2px 8px;
  }
  .header-tier .tier-badge .ti { font-size: 11px; }
  /* 인게임 헤더 난이도 배지 (SCORE 위쪽) — 티어와 대칭 */
  .header-diff {
    margin-bottom: 4px;
    min-height: 18px;
  }

  /* 모달 상단 티어 hero */
  .modal-tier-hero {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
    text-align: center;
  }
  .modal-tier-hero .tier-badge { font-size: 15px; padding: 6px 16px; }
  .modal-tier-hero .tier-meta { font-size: 12px; opacity: 0.75; margin-top: 8px; }
  .modal-tier-hero .tier-progress-bar {
    width: 100%; height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px; overflow: hidden;
    margin-top: 8px;
  }
  .modal-tier-hero .tier-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #FFD700, #FF8C00);
    transition: width 0.4s ease;
  }

  /* 종합기록 - 카드/그리드/배지 시각화 */
  .rec-streak-hero {
    margin-bottom: 14px;
    padding: 14px 18px;
    background: linear-gradient(135deg, #FF6B35, #F7931E);
    border-radius: 14px;
    color: #fff;
    font-weight: 800;
    font-size: 18px;
    text-align: center;
    box-shadow: 0 4px 14px rgba(255,107,53,0.45);
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .rec-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }
  .rec-card {
    background: linear-gradient(135deg, rgba(255,215,0,0.13), rgba(255,140,0,0.05));
    border: 1px solid rgba(255,215,0,0.28);
    border-radius: 12px;
    padding: 12px 10px;
    text-align: center;
    transition: transform 0.15s;
  }
  .rec-card:hover { transform: translateY(-2px); }
  .rec-card .ico { font-size: 22px; margin-bottom: 4px; line-height: 1; }
  .rec-card .num { font-size: 22px; font-weight: 800; color: #FFD700; line-height: 1.2; }
  .rec-card .num.small { font-size: 16px; }
  .rec-card .label { font-size: 11px; opacity: 0.7; margin-top: 4px; }
  .rec-section-title {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 700;
    margin: 16px 0 8px 0;
    color: #87CEFA;
    border-bottom: 1px solid rgba(135,206,250,0.3);
    padding-bottom: 4px;
  }
  .rec-diff-card {
    padding: 12px 14px;
    border-radius: 12px;
    margin-bottom: 8px;
    border-left-width: 4px;
    border-left-style: solid;
  }
  .rec-diff-card.easy   { background: linear-gradient(135deg, rgba(46,125,50,0.25), rgba(46,125,50,0.05)); border-left-color: #66BB6A; }
  .rec-diff-card.medium { background: linear-gradient(135deg, rgba(249,168,37,0.25), rgba(249,168,37,0.05)); border-left-color: #FBC02D; }
  .rec-diff-card.hard   { background: linear-gradient(135deg, rgba(239,108,0,0.30), rgba(239,108,0,0.08)); border-left-color: #FB8C00; }
  .rec-diff-card.hell   { background: linear-gradient(135deg, rgba(194,24,91,0.35), rgba(194,24,91,0.10)); border-left-color: #FF1493; box-shadow: 0 0 14px rgba(255,20,147,0.25); }
  .rec-diff-card .diff-title {
    font-size: 16px; font-weight: 800;
    margin-bottom: 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .rec-diff-card.easy   .diff-title { color: #A5D6A7; }
  .rec-diff-card.medium .diff-title { color: #FFD54F; }
  .rec-diff-card.hard   .diff-title { color: #FFCC80; }
  .rec-diff-card.hell   .diff-title { color: #FF80AB; }
  .rec-diff-card .diff-cleared-badge {
    background: rgba(0,0,0,0.35);
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    color: #FFD700;
  }
  .rec-diff-card .diff-mini-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 6px 12px;
    font-size: 12px;
  }
  .rec-diff-card .diff-mini-row {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .rec-diff-card .diff-mini-row .lbl { opacity: 0.75; }
  .rec-diff-card .diff-mini-row .v { font-weight: 700; color: #fff; }
  .rec-tier-row {
    display: flex; flex-wrap: wrap; gap: 5px;
    padding: 4px 0;
  }
  .rec-tier-chip {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 4px 9px;
    border-radius: 14px;
    font-size: 12px;
  }
  .rec-tier-chip .v { color: #FFD700; font-weight: 700; margin-left: 4px; }
  .rec-tier-chip.zero { opacity: 0.35; }
  .rec-special-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  .rec-special {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    font-size: 12px;
  }
  .rec-special .ico { font-size: 18px; flex: 0 0 22px; text-align: center; }
  .rec-special .lbl { flex: 1; opacity: 0.85; line-height: 1.2; }
  .rec-special .v { font-weight: 700; color: #FFD700; }
  .rec-dates {
    display: flex; gap: 8px; margin-top: 8px;
    font-size: 11px; opacity: 0.6;
    justify-content: center;
  }

  /* 별자리 도감 */
  .ency-item {
    display: flex; gap: 12px; align-items: center;
    padding: 10px; margin: 6px 0;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border-left: 3px solid rgba(255,255,255,0.1);
  }
  .ency-item.unlocked { border-left-color: #FFD700; background: rgba(255,215,0,0.08); }
  .ency-item.locked { opacity: 0.55; }
  .ency-img { width: 60px; height: 60px; flex: 0 0 60px; border-radius: 50%; background: rgba(0,0,0,0.4); }
  .ency-info { flex: 1; min-width: 0; }
  .ency-name { font-weight: 800; font-size: 15px; margin-bottom: 4px; }
  .ency-desc { font-size: 12px; opacity: 0.85; line-height: 1.4; }
  .ency-count { font-size: 11px; opacity: 0.6; margin-top: 4px; color: #FFD700; }

  /* 연속 플레이 표시 */
  .streak-display {
    position: absolute;
    top: 16px; left: 16px;
    background: linear-gradient(135deg, #FF6B35, #F7931E);
    color: #fff;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(255,107,53,0.4);
    z-index: 2;
    display: none;
  }
  .streak-display.show { display: block; }

  /* 풀스크린 임팩트 */
  .fullscreen-impact {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 150;
    display: none;
    align-items: center; justify-content: center;
  }
  .fullscreen-impact.show { display: flex; }
  .fullscreen-impact .impact-bg {
    position: absolute; inset: 0;
    animation: impactFlash 1.4s ease-out forwards;
  }
  .fullscreen-impact .impact-text {
    position: relative;
    font-size: 56px;
    font-weight: 900;
    color: #FFD700;
    text-shadow: 0 0 20px #FFD700, 0 0 40px #FF8C00, 0 0 60px #FF1493;
    animation: impactZoom 1.4s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
    text-align: center;
    letter-spacing: 4px;
  }
  @keyframes impactFlash {
    0%   { background: rgba(255, 215, 0, 0); }
    15%  { background: rgba(255, 215, 0, 0.5); }
    100% { background: rgba(255, 215, 0, 0); }
  }
  @keyframes impactZoom {
    0%   { transform: scale(0.3); opacity: 0; }
    25%  { transform: scale(1.4); opacity: 1; }
    60%  { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* 결과 공유 버튼 */
  .gameover-overlay button.share {
    background: linear-gradient(135deg, #4CAF50, #2E7D32);
    color: #fff;
    margin-top: 6px;
  }

  /* ======= 모바일: 글씨 전반적으로 크게 ======= */
  @media (max-width: 600px) {
    .title { font-size: 18px; }
    .score-block .label { font-size: 13px; }
    .score-block .value { font-size: 26px; }
    .score-block.best .value { font-size: 20px; }
    .next-block .label { font-size: 12px; }
    .next-block .name { font-size: 12px; }
    .next-slot .slot-label { font-size: 12px !important; }

    .item-btn, .pause-btn { font-size: 16px; padding: 14px; }
    .item-btn .cd { font-size: 13px; }

    .gameover-overlay h2 { font-size: 36px; }
    .gameover-overlay div { font-size: 16px; }
    .gameover-overlay button { font-size: 16px; padding: 12px 28px; }

    .modal h3 { font-size: 24px; }
    .modal-content { font-size: 15px; line-height: 1.7; }
    .modal-close { font-size: 16px; padding: 12px; }

    .stat-row { font-size: 14px; padding: 10px 4px; }
    .stat-row .stat-label, .stat-row .stat-value { font-size: 14px; }

    .achievement-item { padding: 10px; }
    .achievement-item .ach-icon { font-size: 28px; }
    .achievement-item .ach-name { font-size: 15px; }
    .achievement-item .ach-desc { font-size: 13px; }

    .menu-btn { font-size: 16px; padding: 16px; }
    .menu-btn.primary { font-size: 18px; }

    .game-title { font-size: 36px; letter-spacing: 1px; }
    .game-subtitle { font-size: 14px; }

    .icon-btn { width: 44px; height: 44px; font-size: 20px; }
    .icon-btn.lang { font-size: 13px; }

    .deadline-countdown { font-size: 28px; padding: 8px 22px; }
    .combo-toast { font-size: 26px; }

    .diff-btn { font-size: 16px; padding: 16px; }
    .diff-btn .diff-name { font-size: 18px; }

    .howto-item { font-size: 14px; }
    .howto-item .ic { font-size: 20px; }
    .diff-table { font-size: 13px; }
    .diff-table th { font-size: 12px; }

    .badge { font-size: 12px; padding: 4px 10px; }
    .diff-badge { font-size: 12px; padding: 3px 10px; }
    .hell-bar { font-size: 14px; }
    .hell-bar .timer-label { font-size: 12px; }
    .hell-bar .timer-value { font-size: 16px; }

    /* 진행바: 모바일에서 9~10셀이 한 줄에 들어가도록 축소 */
    .tier-progress { padding: 4px 3px; gap: 0; }
    .tier-cell { flex: 0 1 auto; width: 20px; height: 20px; min-width: 18px; }
    .tier-cell canvas { width: 16px; height: 16px; }
    .tier-cell .locked-mark { font-size: 8px; }
    .tier-arrow { font-size: 6px; }
  }

  /* ======= 랭킹 시스템 (v3) ======= */
  .rk-field { margin: 12px 0; text-align: left; }
  .rk-field > label { display: block; font-size: 13px; opacity: 0.8; margin-bottom: 6px; }
  .rk-input, .rk-select {
    width: 100%; padding: 11px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.35); color: #fff;
    font-size: 15px; outline: none;
  }
  .rk-input:focus, .rk-select:focus { border-color: #FFD700; }
  .rk-select option { color: #000; }
  .rk-name-row { display: flex; align-items: center; gap: 8px; }
  .rk-name-row .rk-input { flex: 1; }
  .rk-name-flag { font-size: 24px; flex: 0 0 auto; }
  .rk-err { color: #FF6B6B; font-size: 12px; margin-top: 5px; min-height: 14px; }
  .rk-school-wrap { position: relative; }
  .rk-school-list {
    position: absolute; left: 0; right: 0; top: 100%;
    margin-top: 4px; max-height: 180px; overflow-y: auto;
    background: #141a3a; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px; z-index: 5; display: none;
  }
  .rk-school-list.show { display: block; }
  .rk-school-item {
    padding: 10px 12px; font-size: 14px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .rk-school-item:hover, .rk-school-item.active { background: rgba(255,215,0,0.15); }
  .rk-school-item .kind { font-size: 11px; opacity: 0.6; margin-left: 6px; }
  .rk-school-item.custom { color: #87CEFA; }
  .rk-mock {
    font-size: 11px; opacity: 0.55; text-align: center;
    margin-top: 10px; font-style: italic;
  }
  /* 탭 */
  .rk-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .rk-tab {
    flex: 1; padding: 9px; border-radius: 9px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); color: #fff;
    font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .rk-tab.active { background: linear-gradient(135deg,#FFD700,#FF8C00); color: #1a1a1a; border: none; }
  .rk-subtabs { display: flex; gap: 6px; margin-bottom: 10px; }
  .rk-subtab {
    flex: 1; padding: 7px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04); color: #fff;
    font-size: 12px; cursor: pointer;
  }
  .rk-subtab.active { background: rgba(135,206,250,0.25); border-color: #87CEFA; color: #87CEFA; }
  /* 랭킹 리스트 */
  .rk-list { display: flex; flex-direction: column; gap: 4px; }
  .rk-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 11px; border-radius: 9px;
    background: rgba(255,255,255,0.04);
    font-size: 14px;
  }
  .rk-row .rk-rank { flex: 0 0 30px; text-align: center; font-weight: 800; opacity: 0.85; }
  .rk-row.top1 .rk-rank { color: #FFD700; } .rk-row.top1 { background: rgba(255,215,0,0.13); }
  .rk-row.top2 .rk-rank { color: #C0C0C0; }
  .rk-row.top3 .rk-rank { color: #CD7F32; }
  .rk-row .rk-flag { flex: 0 0 auto; font-size: 18px; }
  .rk-row .rk-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rk-row .rk-sub { font-size: 11px; opacity: 0.6; }
  .rk-row .rk-score { flex: 0 0 auto; font-weight: 800; color: #FFD700; font-variant-numeric: tabular-nums; }
  .rk-row.me { border: 1.5px solid #FFD700; background: rgba(255,215,0,0.1); }
  .rk-divider { text-align: center; opacity: 0.4; font-size: 13px; margin: 6px 0; letter-spacing: 3px; }
  .rk-empty { text-align: center; opacity: 0.6; padding: 24px 0; font-size: 14px; }
  /* 게임오버 랭킹 라인 */
  .gameover-rank {
    font-size: 14px; color: #FFD700; font-weight: 700;
    background: rgba(255,215,0,0.12); padding: 6px 14px;
    border-radius: 14px;
  }

  /* ── 랭킹 Phase 2: 폴리싱 ── */
  .rk-mystat {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px; margin-bottom: 12px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(255,215,0,0.18), rgba(255,140,0,0.05));
    border: 1px solid rgba(255,215,0,0.35);
  }
  .rk-mystat .ms-rank { font-size: 22px; font-weight: 900; color: #FFD700; min-width: 46px; text-align: center; line-height: 1; }
  .rk-mystat .ms-rank small { display: block; font-size: 10px; opacity: 0.7; font-weight: 600; margin-top: 2px; }
  .rk-mystat .ms-flag { font-size: 22px; flex: 0 0 auto; }
  .rk-mystat .ms-info { flex: 1; min-width: 0; }
  .rk-mystat .ms-name { font-weight: 800; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rk-mystat .ms-sub { font-size: 11px; opacity: 0.65; }
  .rk-mystat .ms-score { font-size: 18px; font-weight: 800; color: #FFD700; flex: 0 0 auto; }
  .rk-mystat.empty { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); justify-content: center; }
  .rk-mystat.empty .ms-msg { font-size: 13px; opacity: 0.78; text-align: center; }

  .rk-row { animation: rkRowIn 0.34s cubic-bezier(.22,1,.36,1) both; animation-delay: calc(var(--i, 0) * 0.035s); }
  @keyframes rkRowIn { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: none; } }
  .rk-row .rk-rank .rk-medal { font-size: 19px; line-height: 1; }
  .rk-row.me { animation: rkRowIn 0.34s cubic-bezier(.22,1,.36,1) both, rkMeGlow 1.9s ease-in-out 0.5s infinite; }
  @keyframes rkMeGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); }
    50% { box-shadow: 0 0 11px 1px rgba(255,215,0,0.5); }
  }
  .rk-count { text-align: center; font-size: 12px; opacity: 0.6; margin-top: 8px; }
  .rk-subtab.d-easy.active   { background: rgba(102,187,106,0.28); border-color: #66BB6A; color: #A5D6A7; }
  .rk-subtab.d-medium.active { background: rgba(255,213,79,0.25); border-color: #FFD54F; color: #FFD54F; }
  .rk-subtab.d-hard.active   { background: rgba(255,140,0,0.28); border-color: #FB8C00; color: #FFCC80; }
  .rk-subtab.d-hell.active   { background: rgba(255,20,147,0.3);  border-color: #FF1493; color: #FF80AB; }

  /* ============ 전체 UI 업그레이드 (비주얼 폴리싱) ============ */
  /* 모달: 등장 애니메이션 + 배경 블러 + 깊이감 */
  .modal-overlay { backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
  .modal-overlay.show .modal { animation: uiModalPop 0.3s cubic-bezier(.22,1,.36,1); }
  @keyframes uiModalPop {
    from { opacity: 0; transform: translateY(12px) scale(0.96); }
    to   { opacity: 1; transform: none; }
  }
  .modal {
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow: 0 18px 50px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .modal h3 { text-shadow: 0 0 14px rgba(255,215,0,0.35); }
  /* 다크 테마 스크롤바 */
  .modal::-webkit-scrollbar, .start-screen::-webkit-scrollbar { width: 8px; }
  .modal::-webkit-scrollbar-track, .start-screen::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb, .start-screen::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(255,215,0,0.5), rgba(255,140,0,0.4));
    border-radius: 4px;
  }
  /* 메뉴 버튼: 입체감 + 호버 리프트 + 프라이머리 샤인 */
  .menu-btn {

//   diamond(19000)은 전체의 약 80% — 마스터(전 업적 해금) 직전 최고 수치 티어
const TIER_LEVELS = [
  { id: 'iron',     icon: '⚙',  minPts: 0      },

];

function calcTrophyPoints() {
  let total = 0;
  for (const id in stats.achievements) {
    if (stats.achievements[id] && ACH_POINTS[id]) {
      total += ACH_POINTS[id];
    }
  }
  return total;
}
function calcMaxTrophyPoints() {
  let total = 0;
  for (const id in ACH_POINTS) total += ACH_POINTS[id];
  return total;
}
function getCurrentTier() {
  const points = calcTrophyPoints();
  // 모든 업적 해금 → 마스터
  const totalAch = (I18N.ko.achList || []).length;
  const unlockedCount = Object.keys(stats.achievements).filter(k => stats.achievements[k]).length;
  if (unlockedCount >= totalAch && totalAch > 0) {
    return { tier: TIER_LEVELS[TIER_LEVELS.length - 1], points, nextTier: null, progressPct: 100 };
  }
  // 그 외엔 점수 기준
  let currentIdx = 0;
  for (let i = 0; i < TIER_LEVELS.length - 1; i++) {
    if (points >= TIER_LEVELS[i].minPts) currentIdx = i;
    else break;
  }
  const nextIdx = Math.min(currentIdx + 1, TIER_LEVELS.length - 1);
  const nextTier = TIER_LEVELS[nextIdx];
  // 진행도: 현재 티어 → 다음 티어 사이의 비율
  const curMin = TIER_LEVELS[currentIdx].minPts;
  const nextMin = nextTier && nextTier.id !== 'master' ? nextTier.minPts : (curMin + 1);
  const pct = Math.min(100, Math.max(0, ((points - curMin) / (nextMin - curMin)) * 100));
  return { tier: TIER_LEVELS[currentIdx], points, nextTier, progressPct: pct };
}

function tierBadgeHTML(tier, withIcon = true, customLabel) {
  const label = customLabel || t('tierName_' + tier.id) || tier.id;
  return `<span class="tier-badge ${tier.id}">${withIcon ? `<span class="ti">${tier.icon}</span>` : ''}<span>${label}</span></span>`;
}

// 모든 티어 표시 영역 갱신
function refreshTierDisplays() {
  const info = getCurrentTier();
  const tier = info.tier;
  // 시작 화면 hero
  const startHero = document.getElementById('startTierHero');
  if (startHero) {
    let html = tierBadgeHTML(tier, true);
    if (tier.id !== 'master' && info.nextTier) {
      html += `<div class="tier-progress-bar"><div class="tier-progress-fill" style="width:${info.progressPct.toFixed(1)}%"></div></div>`;
      html += `<div class="tier-points-text">🏆 ${info.points} / ${info.nextTier.minPts} → ${t('tierName_' + info.nextTier.id) || info.nextTier.id}</div>`;
    } else {
      html += `<div class="tier-points-text">🏆 ${info.points} ${t('tierMaxLabel') || 'pts'}</div>`;
    }
    startHero.innerHTML = html;
  }
  // 인게임 헤더
  const headerTier = document.getElementById('headerTier');
  if (headerTier) {
    headerTier.innerHTML = tierBadgeHTML(tier, true);
  }
}
function showAchToast(id) {
  const def = t('achList').find(a => a.id === id);
  if (!def) return;
  const toast = document.createElement('div');
  toast.style.cssText = `position:fixed; top:20px; left:50%; transform:translateX(-50%);
    background:linear-gradient(135deg,#FFD700,#FF8C00); color:#000; padding:10px 18px;
    border-radius:24px; font-weight:700; z-index:300; box-shadow:0 4px 20px rgba(255,215,0,0.5);
    animation: slideDown 0.4s ease-out;`;
  toast.textContent = `🏆 ${def.icon} ${def.name}`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

  const overlay = document.getElementById('fullscreenImpact');
  const text = document.getElementById('impactText');
  if (!overlay || !text) return;
  text.textContent = tierName(tier) + '!';
  overlay.classList.remove('show');
  void overlay.offsetWidth; // reflow → 애니메이션 재시작
  overlay.classList.add('show');
  clearTimeout(showFullscreenImpact._t);
  showFullscreenImpact._t = setTimeout(() => overlay.classList.remove('show'), 1400);
}

// ---- 최소 외접원(Smallest Enclosing Circle) — Welzl's algorithm ----
function _circle2(a, b) {
  const cx = (a[0] + b[0]) / 2, cy = (a[1] + b[1]) / 2;
  const r = Math.hypot(a[0] - cx, a[1] - cy);
  return { x: cx, y: cy, r };
}
function _circle3(a, b, c) {
  const ax = a[0], ay = a[1], bx = b[0], by = b[1], cx2 = c[0], cy2 = c[1];
  const d = 2 * (ax * (by - cy2) + bx * (cy2 - ay) + cx2 * (ay - by));
  if (Math.abs(d) < 1e-10) return null;
  const ux = ((ax*ax + ay*ay)*(by - cy2) + (bx*bx + by*by)*(cy2 - ay) + (cx2*cx2 + cy2*cy2)*(ay - by)) / d;
  const uy = ((ax*ax + ay*ay)*(cx2 - bx) + (bx*bx + by*by)*(ax - cx2) + (cx2*cx2 + cy2*cy2)*(bx - ax)) / d;
  return { x: ux, y: uy, r: Math.hypot(ax - ux, ay - uy) };
}
function _trivialCircle(R) {
  if (R.length === 0) return { x: 0, y: 0, r: 0 };
  if (R.length === 1) return { x: R[0][0], y: R[0][1], r: 0 };
  if (R.length === 2) return _circle2(R[0], R[1]);
  return _circle3(R[0], R[1], R[2]) || _circle2(R[0], R[1]);
}
function _inCircle(p, c) {
  if (!c) return false;
  const dx = p[0] - c.x, dy = p[1] - c.y;
  return dx * dx + dy * dy <= c.r * c.r + 1e-7;
}
// 반복형(스택 안전) Welzl 변형
function smallestEnclosingCircle(points) {
  const P = points.slice();
  // 셔플
  for (let i = P.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [P[i], P[j]] = [P[j], P[i]];
  }
  let c = null;
  for (let i = 0; i < P.length; i++) {
    if (!c || !_inCircle(P[i], c)) {
      c = { x: P[i][0], y: P[i][1], r: 0 };
      for (let j = 0; j < i; j++) {
        if (!_inCircle(P[j], c)) {
          c = _circle2(P[i], P[j]);
          for (let k = 0; k < j; k++) {
            if (!_inCircle(P[k], c)) {
              c = _circle3(P[i], P[j], P[k]) || c;
            }
          }
        }
      }
    }
  }
  return c;
}

// PNG 불투명 픽셀 분포로 SEC를 계산
function computeImageSEC(img) {
  // 다운샘플링 (성능)
  const SAMPLE = 200;
  const ratio = Math.min(1, SAMPLE / Math.max(img.width, img.height));
  const w = Math.max(1, Math.floor(img.width * ratio));
  const h = Math.max(1, Math.floor(img.height * ratio));
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const oc = off.getContext('2d');
  oc.drawImage(img, 0, 0, w, h);
  let data;
  try { data = oc.getImageData(0, 0, w, h).data; }
  catch (e) { return null; } // file:// CORS 등

  // 불투명 + 흰색 배경 아닌 픽셀 좌표 수집
  const pts = [];
  const step = 2;
  for (let y = 0; y < h; y += step) {
    for (let x = 0; x < w; x += step) {
      const idx = (y * w + x) * 4;
      const a = data[idx + 3];
      const rC = data[idx], gC = data[idx + 1], bC = data[idx + 2];
      if (a > 50 && !(rC > 240 && gC > 240 && bC > 240)) pts.push([x, y]);
    }
  }
  if (pts.length < 3) return null;

  // SEC 계산은 convex hull 위에서 돌리면 충분히 빠름
  const hull = (function convexHull(points) {
    const ps = points.slice().sort((a, b) => a[0] - b[0] || a[1] - b[1]);
    const cross = (o, a, b) => (a[0]-o[0])*(b[1]-o[1]) - (a[1]-o[1])*(b[0]-o[0]);
    const lower = [];
    for (const p of ps) {
      while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
      lower.push(p);
    }
    const upper = [];
    for (let i = ps.length - 1; i >= 0; i--) {
      const p = ps[i];
      while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
      upper.push(p);
    }
    upper.pop(); lower.pop();
    return lower.concat(upper);
  })(pts);

  const sec = smallestEnclosingCircle(hull.length >= 3 ? hull : pts);
  if (!sec) return null;
  // 다운샘플링된 좌표 → 원본 픽셀 좌표
  return {
    cx: sec.x / ratio,
    cy: sec.y / ratio,
    r:  sec.r / ratio,
  };
}

function tryLoadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}
function tryLoadSound(src) {
  return new Promise(resolve => {
    const a = new Audio();
    a.oncanplaythrough = () => resolve(a);
    a.onerror = () => resolve(null);
    a.src = src;
    a.load();
  });
}
async function preloadAssets() {
  // 천체 이미지 + 각 PNG의 최소외접원(SEC) 사전 계산
  for (let i = 0; i < ASSET_CONFIG.tierImages.length; i++) {
    const img = await tryLoadImage(ASSET_CONFIG.tierImages[i]);
    if (img) {
      loadedImages[i] = img;
      const sec = computeImageSEC(img);
      if (sec) tierImageSEC[i] = sec;
    }
  }
  // 배경
  bgImage = await tryLoadImage(ASSET_CONFIG.background);
  // 사운드
  for (const [key, cfg] of Object.entries(ASSET_CONFIG.sounds)) {
    const a = await tryLoadSound(cfg.src);
    if (a) {
      a.volume = cfg.volume ?? 0.5;
      if (cfg.loop) a.loop = true;
      loadedSounds[key] = a;
    }
  }
}

function playSoundFile(key) {
  if (!soundEnabled) return true; // 음소거지만 합성음으로도 떨어지지 않게 true 반환
  const a = loadedSounds[key];
  if (!a) return false;
  // 동시 재생을 위해 복제 (bgm 제외)
  if (key === 'bgm') {
    a.play().catch(() => {});
  } else {
    const clone = a.cloneNode();
    clone.volume = a.volume;
    clone.play().catch(() => {});
  }
  return true;
}

// ---------------- Web Audio (간단 톤 신디사이저) ----------------
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  return audioCtx;
}
function playTone(freq, duration = 0.12, type = 'sine', volume = 0.15) {
  if (!soundEnabled) return;
  const ac = ensureAudio();
  if (!ac) return;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  osc.connect(gain).connect(ac.destination);
  osc.start();
  osc.stop(ac.currentTime + duration);
}
// 외부 사운드 파일이 있으면 그것을 사용, 없으면 합성음으로 폴백

function initEngine() {
  engine = Engine.create();
  engine.world.gravity.y = 1.0;

  const wallOpts = { isStatic: true, friction: 0.4 };
  World.add(world, [
    Bodies.rectangle(WIDTH / 2, HEIGHT + WALL_THICKNESS / 2, WIDTH, WALL_THICKNESS, wallOpts), // 바닥
    Bodies.rectangle(-WALL_THICKNESS / 2, HEIGHT / 2, WALL_THICKNESS, HEIGHT * 2, wallOpts),    // 좌벽

  ]);

  // Matter.js Runner 대신 자체 fixed-timestep 루프 사용

}

// ---------------- 자체 물리 루프 (60Hz 고정) ----------------
let _physicsRAF = null;
let _physicsLast = 0;
let _physicsAccum = 0;
const PHYSICS_DELTA = 1000 / 60; // 60Hz 고정 시간 간격

function startPhysicsLoop() {
  if (runner) runner.enabled = true;
  _physicsLast = performance.now();
  _physicsAccum = 0;
  const tick = (now) => {
    if (!runner || !runner.enabled) return;
    const elapsed = now - _physicsLast;
    _physicsLast = now;
    // 누적 시간에 elapsed 더하고, spiral of death 방지를 위해 200ms로 제한
    _physicsAccum = Math.min(200, _physicsAccum + elapsed);
    // 물리는 정확히 60Hz로 갱신 (주사율 영향 없음)
    while (_physicsAccum >= PHYSICS_DELTA) {
      Engine.update(engine, PHYSICS_DELTA);
      _physicsAccum -= PHYSICS_DELTA;
    }
    _physicsRAF = requestAnimationFrame(tick);
  };
  _physicsRAF = requestAnimationFrame(tick);
}

function stopPhysicsLoop() {
  if (runner) runner.enabled = false;
  if (_physicsRAF) {
    cancelAnimationFrame(_physicsRAF);
    _physicsRAF = null;
  }
}

const tierProgressEl = document.getElementById('tierProgress');
function buildTierProgress() {
  // 성운(0)은 시작 단계라 제외, 남십자(1)부터 시작
  // 끝 인덱스는 난이도별 클리어 단계까지만 표시 (스포 방지 + 목표 명확화)
  tierProgressEl.innerHTML = '';
  const startIdx = 1;
  const endIdx = PROGRESS_END[currentDifficulty] ?? (TIERS.length - 1);
  for (let i = startIdx; i <= endIdx; i++) {
    const cell = document.createElement('div');
    cell.className = 'tier-cell';
    cell.dataset.tier = i;
    cell.title = tierName(i);
    cell.innerHTML = '<span class="locked-mark">?</span>';
    tierProgressEl.appendChild(cell);
    if (i < endIdx) {
      const arr = document.createElement('span');
      arr.className = 'tier-arrow';
      arr.textContent = '➜';
      tierProgressEl.appendChild(arr);
    }
  }
}
function updateTierProgress() {
  const cells = tierProgressEl.querySelectorAll('.tier-cell');
  // 현재 등장한 가장 높은 단계 찾기 (current 강조용)
  let maxUnlocked = -1;
  for (const t of unlockedTiers) maxUnlocked = Math.max(maxUnlocked, t);
  cells.forEach(cell => {
    const tier = parseInt(cell.dataset.tier, 10);
    const isUnlocked = unlockedTiers.has(tier);
    cell.classList.toggle('unlocked', isUnlocked);
    cell.classList.toggle('current', tier === maxUnlocked);
    if (isUnlocked) {
      // PNG 또는 색상 원으로 표시
      const img = loadedImages[tier];
      const data = TIERS[tier];
      if (cell.dataset.rendered === String(tier)) return; // 중복 렌더 방지
      cell.dataset.rendered = String(tier);
      cell.innerHTML = '';
      const c = document.createElement('canvas');
      c.width = 44; c.height = 44; // 2x for retina
      const cc = c.getContext('2d');
      // 옅은 색 원 배경
      const grad = cc.createRadialGradient(22, 22, 4, 22, 22, 22);
      grad.addColorStop(0, lighten(data.color, 0.5));
      grad.addColorStop(1, data.color);
      cc.globalAlpha = 0.4;
      cc.fillStyle = grad;
      cc.beginPath(); cc.arc(22, 22, 21, 0, Math.PI * 2); cc.fill();
      cc.globalAlpha = 1;
      // PNG가 있으면 그리기
      if (img) {
        const aspect = img.width / img.height;
        const size = 36;
        let iw, ih;
        if (aspect >= 1) { iw = size; ih = size / aspect; }
        else             { ih = size; iw = size * aspect; }
        cc.drawImage(img, 22 - iw/2, 22 - ih/2, iw, ih);
      } else {
        // 별자리 도트 패턴 fallback
        drawConstellation(cc, 22, 22, 18, tier, 1);
      }
      cell.appendChild(c);
    } else {
      // 잠금 (?)
      if (cell.dataset.rendered !== 'locked') {
        cell.dataset.rendered = 'locked';
        cell.innerHTML = '<span class="locked-mark">?</span>';
      }
    }
  });
}

// ---------------- 천체 생성 ----------------
function createBody(x, y, tier, extra = {}) {
  const data = TIERS[tier];
  const tierFactor = tier / (TIERS.length - 1);
  // 어려움 / 헬 모드: 바다뱀(tier 10)은 빨간선~바닥 거리만큼 큰 오버사이즈로 생성
  // → 자연스럽게 빨간선과 닿아 10초 카운트다운 → 게임오버 + 클리어 연출
  let radius = data.radius;
  const isFinalHydra = (currentDifficulty === 'hard' || currentDifficulty === 'hell') && tier === 10;
  if (isFinalHydra) {
    radius = FINAL_HYDRA_RADIUS;
  }
  const body = Bodies.circle(x, y, radius, {
    restitution: 0.45 - tierFactor * 0.1,
    friction: 0.05 + tierFactor * 0.15,
    frictionAir: 0.005,
    density: 0.001,
    label: 'star',
    slop: 0.02,
    ...extra,
  });
  body.tier = tier;
  body.customRadius = radius; // 렌더/판정 시 참조 (오버사이즈 대응)
  body.justMerged = false;
  body.spawnTime = performance.now();
  World.add(world, body);
  // 최종 바다뱀: 바닥 중앙에 static으로 배치 (벽 충돌 회피 + 위치 고정)
  if (isFinalHydra) {
    Body.setStatic(body, true);
    Body.setPosition(body, { x: WIDTH / 2, y: HEIGHT - radius });
    Body.setVelocity(body, { x: 0, y: 0 });
  }
  // 진행 바 갱신: 새로 등장한 단계는 unlock
  if (!unlockedTiers.has(tier)) {
    unlockedTiers.add(tier);
    updateTierProgress();
  }
  // 단계별 도달 횟수 누적 (통계)
  stats.tierReachCount = stats.tierReachCount || {};
  stats.tierReachCount[tier] = (stats.tierReachCount[tier] || 0) + 1;
  // 별 수집가: 별(tier 0) 누적 1000개
  if (tier === 0 && (stats.tierReachCount[0] || 0) >= 1000) {
    unlockAchievement('starCollector');
  }
  // 별 폭포: 별(tier 0) 누적 10,000개
  if (tier === 0 && (stats.tierReachCount[0] || 0) >= 10000) {
    unlockAchievement('starFall');
  }
  // 바다뱀 사냥꾼: 바다뱀(tier 10) 누적 10회 도달
  if (tier === 10 && (stats.tierReachCount[10] || 0) >= 10) {
    unlockAchievement('hydraHunter');
  }
  // 도서관: 누적으로 모든 11단계 도달
  let allReached = true;
  for (let t = 0; t < TIERS.length; t++) {
    if (!stats.tierReachCount[t]) { allReached = false; break; }
  }
  if (allReached) unlockAchievement('library');
  // 콜렉터: 한 화면에 별자리 동시 존재 — 바다뱀(tier 10) 제외 10종이 모두 있을 때
  const presentTiers = new Set();
  for (const b of Composite.allBodies(world)) {
    if (b.label === 'star' && b.tier < TIERS.length - 1) presentTiers.add(b.tier);
  }
  if (presentTiers.size >= TIERS.length - 1) {
    unlockAchievement('collector');
  }
  return body;
}

// ---------------- 충돌(병합) ----------------
function handleCollision(event) {
  if (isGameOver || isPaused) return;
  const removedIds = new Set();

  for (const pair of event.pairs) {
    const a = pair.bodyA, b = pair.bodyB;
    if (a.label !== 'star' || b.label !== 'star') continue;
    if (a.tier !== b.tier) continue;
    if (a.tier === TIERS.length - 1) continue;
    // 난이도별 병합 제한: 해당 단계 이상은 합쳐지지 않음
    const maxMerge = MAX_MERGE_TIER[currentDifficulty] ?? 10;
    if (a.tier >= maxMerge) continue;
    if (removedIds.has(a.id) || removedIds.has(b.id)) continue;
    if (a.justMerged || b.justMerged) continue;

    a.justMerged = true; b.justMerged = true;
    removedIds.add(a.id); removedIds.add(b.id);

    const newTier = a.tier + 1;
    const mx = (a.position.x + b.position.x) / 2;
    const my = (a.position.y + b.position.y) / 2;
    const tierColor = TIERS[a.tier].color;

    // 사라진 공에 _removed 플래그 부여 → 지연된 setTimeout이 stale 추가하는 것 방지
    a._removed = true; b._removed = true;
    droppedBodies.delete(a); droppedBodies.delete(b);
    World.remove(world, a); World.remove(world, b);

    const newBody = createBody(mx, my, newTier);
    droppedBodies.add(newBody);

    // 팝 애니메이션 (스케일 1.4 → 1.0)
    popAnims.set(newBody, { start: performance.now(), duration: 220 });

    spawnMergeParticles(mx, my, tierColor);
    sndMerge(newTier);
    // 큰 별자리(처녀/바다뱀) 등장 시 풀스크린 임팩트 + 강한 진동
    if (newTier >= 9) {
      showFullscreenImpact(newTier);
      vibrate([120, 60, 200]);
    }

    // 화면 흔들림 (큰 단계일수록 강하게)
    addShake(2 + newTier * 0.6);

    // 콤보
    const now = performance.now();
    combo = (now - lastMergeTime < COMBO_WINDOW_MS) ? combo + 1 : 1;
    lastMergeTime = now;

    // 점수: 누적식 (수박게임 방식)
    const baseScore = (newTier + 1) * (newTier + 2) / 2 * 5;
    // 콤보 배수: 선형 무상한(combo) → 가산형으로 완만화하여 점수 폭주 방지
    const multiplier = combo >= 2 ? (1 + (combo - 1) * COMBO_STEP) : 1;
    score += Math.floor(baseScore * multiplier);
    updateScoreUI();

    if (combo >= 2) showComboToast(combo, multiplier);

    // 병합 반동: 주변 천체에 방사형 임펄스 → 주변 별이 흔들림
    applyMergeRecoil(mx, my, newTier);

    // 통계 / 업적
    stats.totalMerges++;
    if (newTier > stats.maxTier) stats.maxTier = newTier;
    saveStats();
    unlockAchievement('firstMerge');
    if (combo >= 3)  unlockAchievement('combo3');
    if (combo >= 5)  unlockAchievement('combo5');
    if (combo >= 8)  unlockAchievement('combo10');
    if (combo >= 10) unlockAchievement('combo15');
    if (combo > _maxComboThisGame) _maxComboThisGame = combo;
    // 무한 동력: 한 게임 50회 병합
    _mergeCountThisGame++;
    if (_mergeCountThisGame >= 50) unlockAchievement('merge50');
    // 폭포수: 한 번의 낙하로 5연쇄 병합
    _mergesThisDrop++;
    if (_mergesThisDrop >= 5) unlockAchievement('cascade');
    // 비트박스: 1초 간격 이내 3연속 병합
    _recentMergeTimes.push(now);
    while (_recentMergeTimes.length > 3) _recentMergeTimes.shift();
    if (_recentMergeTimes.length === 3) {
      const d1 = _recentMergeTimes[1] - _recentMergeTimes[0];
      const d2 = _recentMergeTimes[2] - _recentMergeTimes[1];
      if (d1 < 1000 && d2 < 1000) unlockAchievement('beatbox');
    }
    if (newTier >= 4)  unlockAchievement('tier5');   // 오리온 (index 4)
    if (newTier >= 7)  unlockAchievement('tier8');   // 페가수스 (index 7)
    if (newTier >= 9)  unlockAchievement('tier9');   // 처녀 (index 9)
    if (newTier >= 10) unlockAchievement('tier11');  // 바다뱀 (index 10)
    if (score >= 1000)  unlockAchievement('score1k');
    if (score >= 10000) unlockAchievement('score10k');
    if (score >= 40000) unlockAchievement('score40k');
    if (score >= 80000) unlockAchievement('score80k');
    // 난이도 클리어 (바다뱀 도달)
    checkClearedDifficulty(newTier);
  }
}

// 병합 반동: 폭발 위치 주변 천체에 방사형 힘 적용
function applyMergeRecoil(cx, cy, newTier) {
  // 새로 생성된 단계가 클수록 반동 범위/세기 증가
  const range = 60 + newTier * 18;     // 영향 반경 (px)
  const baseForce = 0.0015 + newTier * 0.0006;
  const bodies = Composite.allBodies(world);
  for (const b of bodies) {
    if (b.label !== 'star' || b.isStatic) continue;
    const dx = b.position.x - cx;
    const dy = b.position.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist === 0 || dist > range) continue;
    // 거리 비례 약화 (선형 감쇠)
    const falloff = 1 - (dist / range);
    const f = baseForce * falloff * b.mass;
    // 순수 방사형 반동 (위쪽 편향 제거 — 작은 공이 천장까지 튀어 끼는 것 방지)
    Body.applyForce(b, b.position, {
      x: (dx / dist) * f,
      y: (dy / dist) * f,
    });
  }
}

function addShake(mag) {
  shake.mag = Math.min(20, Math.max(shake.mag, mag));
}

function showComboToast(n, mult) {
  // 콤보 숫자(강조) + COMBO + 실효 배수(×M)
  const multStr = (mult && mult > 1) ? `×${(+mult.toFixed(2))}` : '';
  comboToast.innerHTML = `<span class="combo-num">${n}</span>COMBO<span class="combo-mult">${multStr}</span>`;
  // 단계별 색/크기 강조 (3 / 6 / 8+) + 높은 콤보는 화면 흔들림으로 시원한 타격감
  comboToast.classList.remove('show', 'combo-c1', 'combo-c2', 'combo-c3');
  if (n >= 8)      { comboToast.classList.add('combo-c3'); addShake(7);   vibrate(28); }
  else if (n >= 6) { comboToast.classList.add('combo-c2'); addShake(4.5); vibrate(16); }
  else if (n >= 3) { comboToast.classList.add('combo-c1'); addShake(2.5); }
  void comboToast.offsetWidth; // 리플로우로 애니메이션 재시작
  comboToast.classList.add('show');
  clearTimeout(showComboToast._t);
  showComboToast._t = setTimeout(() => comboToast.classList.remove('show'), 850);
}

// ---------------- 파티클 ----------------
function spawnMergeParticles(x, y, color) {
  const count = 14;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
    const speed = 2 + Math.random() * 3.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0, color,
      size: 2 + Math.random() * 2.5
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.035;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---------------- 낙하 ----------------
function randomDropTier() {
  return Math.random() < 0.5 ? 0 : 1;
}
function tryDrop(x) {
  if (isGameOver || isPaused) return;
  const now = performance.now();
  if (now - lastDropTime < DROP_COOLDOWN_MS) return;

  ensureAudio();
  const tier = nextTier;
  const r = TIERS[tier].radius;
  const clampedX = Math.max(r + 2, Math.min(WIDTH - r - 2, x));
  const newBody = createBody(clampedX, Math.min(r + 5, DEAD_LINE_Y - r - 5), tier);

  setTimeout(() => {
    // 800ms 사이에 이미 병합/제거된 공이라면 추가하지 않음 (phantom 침범 방지)
    if (newBody && !isGameOver && !newBody._removed) {
      droppedBodies.add(newBody);
    }
  }, 800);

  sndDrop();
  lastDropTime = now;
  _mergesThisDrop = 0; // 새 낙하 시작 → 연쇄 카운터 리셋 (cascade)
  // V2 추적: 첫 드롭 / 마지막 드롭 / 좌우 / 도박꾼
  _hasFirstDropped = true;
  _lastDropTimeThisGame = now;
  if (clampedX < WIDTH / 2) _leftDropsThisGame++;
  else                      _rightDropsThisGame++;
  if (_firstDrops.length < 5) {
    _firstDrops.push(tier);
    if (_firstDrops.length === 5 && _firstDrops.every(t => t === _firstDrops[0])) {
      unlockAchievement('gambler');
    }
  }
  if (_leftDropsThisGame >= 50 || _rightDropsThisGame >= 50) {
    unlockAchievement('oneSidedDrop');
  }
  // 큐에서 다음 공을 꺼내고, 새 공을 큐 뒤에 추가
  nextTier = nextQueue.length > 0 ? nextQueue.shift() : randomDropTier();
  nextQueue.push(randomDropTier());
  updateNextUI();
  // 헬 모드: 낙하 타이머 재시작
  resetHellDropTimer();
}

// ---------------- 입력 ----------------
function getCanvasX(clientX) {
  const rect = canvas.getBoundingClientRect();
  return (clientX - rect.left) * (WIDTH / rect.width);
}
function getCanvasY(clientY) {
  const rect = canvas.getBoundingClientRect();
  return (clientY - rect.top) * (HEIGHT / rect.height);
}
canvas.addEventListener('mousemove', e => { aimX = getCanvasX(e.clientX); });
canvas.addEventListener('mousedown', e => {
  const cx = getCanvasX(e.clientX);
  const cy = getCanvasY(e.clientY);
  if (blackholeTargeting) { tryBlackholeRemoveAt(cx, cy); return; }
  aimX = cx; tryDrop(cx);
});
// 모바일: 탭에서만 떨어뜨리고, 드래그는 조준만
let _touchStartX = 0, _touchStartY = 0, _touchStartTime = 0, _touchMoved = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length > 0) {
    const cx = getCanvasX(e.touches[0].clientX);
    const cy = getCanvasY(e.touches[0].clientY);
    aimX = cx;
    _touchStartX = cx; _touchStartY = cy;
    _touchStartTime = performance.now();
    _touchMoved = false;
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length > 0) {
    const cx = getCanvasX(e.touches[0].clientX);
    const cy = getCanvasY(e.touches[0].clientY);
    aimX = cx;
    const dx = cx - _touchStartX;
    const dy = cy - _touchStartY;
    if (Math.hypot(dx, dy) > 10) _touchMoved = true; // 드래그로 간주
  }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.changedTouches.length === 0) return;
  const tEnd = performance.now();
  const cx = getCanvasX(e.changedTouches[0].clientX);
  const cy = getCanvasY(e.changedTouches[0].clientY);
  // 블랙홀 타겟팅은 위치 기준
  if (blackholeTargeting) { tryBlackholeRemoveAt(cx, cy); return; }
  // 탭 판정: 짧은 시간(500ms 이하) + 거의 안 움직임
  const elapsed = tEnd - _touchStartTime;
  if (!_touchMoved && elapsed < 500) {
    aimX = cx;
    tryDrop(cx);
  }
}, { passive: false });

// 스페이스바: 일시정지
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePause(); }
});

// ---------------- 별자리 그리기 ----------------
function drawConstellation(targetCtx, cx, cy, radius, tier, scale = 1) {
  const pat = CONSTELLATIONS[tier];
  if (!pat) return;
  const r = radius * 0.7 * scale;

  // 단일 별: 4꼭지점 별 + 강한 글로우
  if (pat.single) {
    const starR = radius * 0.55 * scale;
    targetCtx.save();
    targetCtx.translate(cx, cy);
    targetCtx.fillStyle = '#fff';
    targetCtx.shadowColor = '#fff';
    targetCtx.shadowBlur = starR * 1.5;
    targetCtx.beginPath();
    // 4꼭지점 별 모양 (수평/수직으로 길고 대각선은 짧게)
    const tips = 4, outer = starR, inner = starR * 0.32;
    for (let i = 0; i < tips * 2; i++) {
      const a = (i * Math.PI) / tips - Math.PI / 2;
      const rr = (i % 2 === 0) ? outer : inner;
      const px = Math.cos(a) * rr, py = Math.sin(a) * rr;
      if (i === 0) targetCtx.moveTo(px, py);
      else targetCtx.lineTo(px, py);
    }
    targetCtx.closePath();
    targetCtx.fill();
    targetCtx.shadowBlur = 0;
    targetCtx.restore();
    return;
  }

  // 선
  targetCtx.strokeStyle = 'rgba(255,255,255,0.5)';
  targetCtx.lineWidth = Math.max(0.8, radius * 0.025);
  for (const [i, j] of pat.lines) {
    const a = pat.stars[i], b = pat.stars[j];
    targetCtx.beginPath();
    targetCtx.moveTo(cx + a[0] * r, cy + a[1] * r);
    targetCtx.lineTo(cx + b[0] * r, cy + b[1] * r);
    targetCtx.stroke();
  }
  // 점
  targetCtx.fillStyle = '#fff';
  for (const s of pat.stars) {
    const sx = cx + s[0] * r, sy = cy + s[1] * r;
    const dotR = Math.max(1.5, radius * 0.06);
    // 글로우
    targetCtx.shadowColor = '#fff';
    targetCtx.shadowBlur = dotR * 2;
    targetCtx.beginPath();
    targetCtx.arc(sx, sy, dotR, 0, Math.PI * 2);
    targetCtx.fill();
  }
  targetCtx.shadowBlur = 0;
}

// ---------------- 렌더링 ----------------
function render() {
  // 화면 흔들림 감쇠
  if (shake.mag > 0.1) {
    shake.x = (Math.random() - 0.5) * shake.mag;
    shake.y = (Math.random() - 0.5) * shake.mag;
    shake.mag *= 0.85;
  } else {
    shake.x = shake.y = 0;
  }

  ctx.save();
  ctx.translate(shake.x, shake.y);
  ctx.clearRect(-shake.x, -shake.y, WIDTH, HEIGHT);

  drawBackgroundStars();

  // 데드라인 (위험 시 깜빡임)
  const danger = deadLineEnterTime !== null;
  if (danger) {
    const t = (performance.now() / 200) % 1;
    ctx.strokeStyle = `rgba(255, 60, 60, ${0.4 + Math.abs(Math.sin(t * Math.PI)) * 0.5})`;
    ctx.lineWidth = 2.5;
  } else {
    ctx.strokeStyle = 'rgba(255, 80, 80, 0.5)';
    ctx.lineWidth = 1.5;
  }
  ctx.setLineDash([6, 6]);
  ctx.beginPath();
  ctx.moveTo(0, DEAD_LINE_Y);
  ctx.lineTo(WIDTH, DEAD_LINE_Y);
  ctx.stroke();
  ctx.setLineDash([]);
  container.classList.toggle('danger', danger);

  // 천체
  const bodies = Composite.allBodies(world);
  const now = performance.now();
  for (const body of bodies) {
    if (body.label !== 'star') continue;
    const data = TIERS[body.tier];
    const { x, y } = body.position;

    // 팝 애니메이션 스케일
    let scale = 1;
    const pop = popAnims.get(body);
    if (pop) {
      const t = (now - pop.start) / pop.duration;
      if (t >= 1) popAnims.delete(body);
      else scale = 1 + Math.sin(t * Math.PI) * 0.35;
    }

    const baseR = body.customRadius ?? data.radius;
    const r = baseR * scale;
    const customImg = loadedImages[body.tier];

    // 1) 색 원 배경 — 충돌 반지름과 동일한 크기로 그려서 시각=경계 일치
    const grad = ctx.createRadialGradient(x, y, r * 0.2, x, y, r);
    grad.addColorStop(0, lighten(data.color, 0.5));
    grad.addColorStop(1, data.color);
    ctx.globalAlpha = 0.55; // 좀 더 진하게 — 공의 실제 경계가 잘 보이도록
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    if (body.isViolating) {
      // 침범 중인 공에 강렬한 빨간 외곽선 + 펄싱 글로우 + 상단 ⚠ 마커
      const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 120);
      ctx.strokeStyle = `rgba(255, 23, 68, ${pulse})`;
      ctx.lineWidth = 4;
      ctx.shadowColor = '#FF1744';
      ctx.shadowBlur = 18 + pulse * 6;
      ctx.stroke();
      ctx.shadowBlur = 0;
      // 위쪽에 경고 아이콘 (캔버스 안쪽으로 클램프해서 항상 보이도록)
      const warnSize = Math.max(18, r * 0.45);
      const warnX = Math.max(warnSize / 2, Math.min(WIDTH - warnSize / 2, x));
      const warnY = Math.max(warnSize / 2 + 2, y - r - 8);
      ctx.fillStyle = '#FF1744';
      ctx.font = `bold ${warnSize}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 6;
      ctx.fillText('⚠', warnX, warnY);
      ctx.shadowBlur = 0;
    } else {
      // 외곽선을 또렷하게 그려서 충돌 경계를 명확히 시각화
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 1.8;
      ctx.stroke();
    }

    // 2) PNG가 있으면 회전 따라 그리기, 없으면 별자리 도트 패턴
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(body.angle);
    if (customImg) {
      // PNG의 SEC(최소 외접원)이 충돌 원과 일치하게 정렬한 뒤 75%로 축소
      // 중심 좌표는 그대로 두고 크기만 줄임
      const sec = tierImageSEC[body.tier];
      if (sec && sec.r > 0) {
        const s = (r / sec.r) * 0.75;
        const iw = customImg.width * s;
        const ih = customImg.height * s;
        const dx = -sec.cx * s;
        const dy = -sec.cy * s;
        ctx.drawImage(customImg, dx, dy, iw, ih);
      } else {
        // SEC 계산 실패 시 fallback: 원 지름에 맞춤
        const aspect = customImg.width / customImg.height;
        const size = r * 2;
        let iw, ih;
        if (aspect >= 1) { iw = size; ih = size / aspect; }
        else             { ih = size; iw = size * aspect; }
        ctx.drawImage(customImg, -iw / 2, -ih / 2, iw, ih);
      }
    } else {
      drawConstellation(ctx, 0, 0, data.radius, body.tier, scale);
    }
    ctx.restore();

    // 3) 단계 이름 라벨 (회전 무시, 캔버스 안에 클램프)
    // 1단계(별, tier 0)은 작아서 라벨 표시 생략
    if (body.tier !== 0) {
      // 단계별 폰트 크기 직접 지정 (별/tier 0은 라벨 없음)
      // 1:남십자, 2:조랑말, 3:화살, 4:오리온, 5:백조, 6:사자, 7:페가수스, 8:큰곰, 9:처녀, 10:바다뱀
      const TIER_LABEL_FONTS = [0, 11, 12, 14, 16, 18, 20, 22, 24, 30, 38];
      const labelFont = TIER_LABEL_FONTS[body.tier] || 14;
      let labelY = y + r * 0.55;
      labelY = Math.max(labelFont, Math.min(HEIGHT - labelFont, labelY));
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.font = `bold ${labelFont}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 3;
      ctx.fillText(tierName(body.tier), x, labelY);
      ctx.shadowBlur = 0;
    }
  }

  drawAimGuide();
  updateParticles();
  drawParticles();

  ctx.restore();
  requestAnimationFrame(render);
}

function drawAimGuide() {
  if (isGameOver || isPaused) return;
  const data = TIERS[nextTier];
  const r = data.radius;
  const x = Math.max(r + 2, Math.min(WIDTH - r - 2, aimX));

  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.setLineDash([4, 6]);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, 0);
  ctx.lineTo(x, HEIGHT);
  ctx.stroke();
  ctx.setLineDash([]);

  const previewY = Math.min(r + 5, DEAD_LINE_Y - r - 5);
  const customImg = loadedImages[nextTier];

  // 옅은 원 배경
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = data.color;
  ctx.beginPath();
  ctx.arc(x, previewY, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 0.5;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // PNG 또는 별자리 패턴 (SEC 기반 정렬)
  ctx.globalAlpha = 0.85;
  if (customImg) {
    const sec = tierImageSEC[nextTier];
    if (sec && sec.r > 0) {
      const s = (r / sec.r) * 0.75;
      ctx.drawImage(customImg, x - sec.cx * s, previewY - sec.cy * s, customImg.width * s, customImg.height * s);
    } else {
      const aspect = customImg.width / customImg.height;
      const size = r * 1.85;
      let iw, ih;
      if (aspect >= 1) { iw = size; ih = size / aspect; }
      else             { ih = size; iw = size * aspect; }
      ctx.drawImage(customImg, x - iw / 2, previewY - ih / 2, iw, ih);
    }
  } else {
    drawConstellation(ctx, x, previewY, r, nextTier, 1);
  }
  ctx.globalAlpha = 1;
}

// ---------------- 배경 별 (반짝임) ----------------
let bgStars = [];
function initBgStars() {
  bgStars = [];
  for (let i = 0; i < 50; i++) {
    bgStars.push({
      x: Math.random() * WIDTH,
      y: Math.random() * HEIGHT,
      r: Math.random() * 1.2 + 0.3,
      a: Math.random() * 0.5 + 0.3,
      phase: Math.random() * Math.PI * 2,
      speed: 0.5 + Math.random() * 1.5
    });
  }
}
function drawBackgroundStars() {
  // 사용자 배경 이미지가 있으면 먼저 그리기
  if (bgImage) {
    ctx.drawImage(bgImage, 0, 0, WIDTH, HEIGHT);
  }
  ctx.fillStyle = '#fff';
  const t = performance.now() / 1000;
  for (const s of bgStars) {
    const twinkle = 0.5 + 0.5 * Math.sin(t * s.speed + s.phase);
    ctx.globalAlpha = s.a * (0.5 + 0.5 * twinkle);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function lighten(hex, amt) {
  const c = hex.replace('#', '');
  const r = Math.min(255, parseInt(c.substr(0, 2), 16) + Math.floor(255 * amt));
  const g = Math.min(255, parseInt(c.substr(2, 2), 16) + Math.floor(255 * amt));
  const b = Math.min(255, parseInt(c.substr(4, 2), 16) + Math.floor(255 * amt));
  return `rgb(${r},${g},${b})`;
}
