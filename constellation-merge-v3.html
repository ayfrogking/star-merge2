// NEXT 큐: 헤더에 슬롯 N개를 표시 (난이도별 nextCount)
const nextQueueEl = document.getElementById('nextQueue');
function drawSlotCanvas(canvas, tier) {
  const ctx2 = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx2.clearRect(0, 0, W, H);
  const data = TIERS[tier];
  const r = Math.min(W, H) / 2 - 4;
  const grad = ctx2.createRadialGradient(W/2, H/2, r * 0.2, W/2, H/2, r);
  grad.addColorStop(0, lighten(data.color, 0.5));
  grad.addColorStop(1, data.color);
  ctx2.globalAlpha = 0.35;
  ctx2.fillStyle = grad;
  ctx2.beginPath(); ctx2.arc(W/2, H/2, r, 0, Math.PI * 2); ctx2.fill();
  ctx2.globalAlpha = 1;
  const img = loadedImages[tier];
  if (img) {
    const sec = tierImageSEC[tier];
    if (sec && sec.r > 0) {
      const s = (r / sec.r) * 0.75;
      ctx2.drawImage(img, W/2 - sec.cx * s, H/2 - sec.cy * s, img.width * s, img.height * s);
    } else {
      const aspect = img.width / img.height;
      const size = r * 1.85;
      let iw, ih;
      if (aspect >= 1) { iw = size; ih = size / aspect; }
      else             { ih = size; iw = size * aspect; }
      ctx2.drawImage(img, W/2 - iw/2, H/2 - ih/2, iw, ih);
    }
  } else {
    drawConstellation(ctx2, W/2, H/2, r, tier, 1);
  }
}
function updateNextUI() {
  const cfg = DIFFICULTIES[currentDifficulty];
  const showCount = cfg ? cfg.nextCount : 1;
  nextQueueEl.innerHTML = '';
  const headerEl = document.querySelector('.header');
  if (showCount === 0) {
    // 헬 모드: NEXT 박스 숨김 + 헤더 그리드 2컬럼으로 변경 (BEST 우측 정렬 유지)
    document.querySelector('.next-block').style.display = 'none';
    if (headerEl) headerEl.style.gridTemplateColumns = '1fr auto';
    return;
  }
  document.querySelector('.next-block').style.display = '';
  if (headerEl) headerEl.style.gridTemplateColumns = '';
  // 큐가 부족하면 임시로 채움
  while (nextQueue.length < showCount) nextQueue.push(randomDropTier());
  for (let i = 0; i < showCount; i++) {
    const tier = nextQueue[i];
    const slot = document.createElement('div');
    slot.className = 'next-slot';
    const c = document.createElement('canvas');
    // 첫 슬롯(next1)은 기본 크기, 그 이후(next2..)는 점점 작게
    const sizes = [60, 40, 32];
    const cssSizes = [40, 26, 22];
    const px = sizes[Math.min(i, sizes.length - 1)];
    const cssPx = cssSizes[Math.min(i, cssSizes.length - 1)];
    c.width = px; c.height = px;
    c.style.width = cssPx + 'px';
    c.style.height = cssPx + 'px';
    drawSlotCanvas(c, tier);
    slot.appendChild(c);
    const lbl = document.createElement('span');
    lbl.className = 'slot-label';
    lbl.style.fontSize = (i === 0 ? 9 : 8) + 'px';
    lbl.textContent = tierName(tier);
    slot.appendChild(lbl);
    nextQueueEl.appendChild(slot);
  }
}

// ---------------- 게임 오버 ----------------
function checkGameOver() {
  if (isGameOver) return;
  const now = performance.now();

  // 알고리즘:
  //  - 공 테두리(top edge)가 빨간선 위에 있고 + 속도가 낮으면 침범
  //  - 한 공이라도 침범 중이면 글로벌 카운터 유지
  //  - 침범 중인 공이 0개가 되면 즉시 리셋
  // 디버그: 어떤 공이 카운트를 유지시키는지 시각화하기 위해 body.isViolating 플래그를 매 프레임 갱신
  let anyViolating = false;
  for (const body of droppedBodies) {
    if (!body || !body.position) { continue; }
    const bodyR = body.customRadius ?? TIERS[body.tier].radius;
    const top = body.position.y - bodyR;
    const bottom = body.position.y + bodyR;
    // 침범 조건 = 공이 빨간선과 실제로 "맞닿아 있는" 상태
    //   - 공의 윗부분이 빨간선 위 (top < DEAD_LINE_Y)
    //   - AND 공의 아랫부분이 빨간선 또는 그 아래 (bottom >= DEAD_LINE_Y)
    //   = 공이 빨간선을 가로지르고 있어야 함
    // → 화면 위로 완전히 벗어난 공은 빨간선과 닿지 않으므로 카운트 안 됨
    const touching = (top < DEAD_LINE_Y) && (bottom >= DEAD_LINE_Y);
    if (!touching) {
      body.isViolating = false;
      continue;
    }
    const vx = Math.abs(body.velocity.x);
    const vy = Math.abs(body.velocity.y);
    const isResting = vx < 0.8 && vy < 0.8;
    body.isViolating = isResting;
    if (isResting) anyViolating = true;
  }

  if (anyViolating) {
    if (deadLineEnterTime === null) {
      deadLineEnterTime = now;
      _deadlineTriggeredThisGame = true; // 한 방 컷 업적 자격 박탈
    }
    else if (now - deadLineEnterTime >= DEAD_LINE_GRACE_MS) triggerGameOver();
  } else {
    // 데드라인에서 탈출한 케이스 (시작했다가 풀림) → 카운트 누적
    if (deadLineEnterTime !== null) {
      stats.deadlineEscapeCount = (stats.deadlineEscapeCount || 0) + 1;
      saveStats();
    }
    deadLineEnterTime = null;
  }
  updateDeadlineCountdown();

  // === V2 매 프레임 추적 ===
  // 1) 화면에 동시에 존재하는 공 수 → 미니멀리스트 / 저글러 판정
  const tierCount = {};
  let totalBalls = 0;
  for (const b of Composite.allBodies(world)) {
    if (b.label === 'star') {
      tierCount[b.tier] = (tierCount[b.tier] || 0) + 1;
      totalBalls++;
    }
  }
  if (totalBalls > _maxConcurrentBalls) _maxConcurrentBalls = totalBalls;
  // 저글러: 같은 tier 5개 동시
  for (const t in tierCount) {
    if (tierCount[t] >= 5) { unlockAchievement('juggler'); break; }
  }
  // 2) 패시브 / 우주 구경꾼 — idle 시간 체크
  if (!isPaused && _gameStartTime > 0) {
    if (!_hasFirstDropped) {
      // 시작 후 30초간 드롭 없음 → 우주 구경꾼
      if (now - _gameStartTime >= 30000) unlockAchievement('skyWatcher');
    } else {
      // 첫 드롭 이후 30초간 드롭 없음 → 패시브
      if (now - _lastDropTimeThisGame >= 30000) unlockAchievement('passiveType');
    }
  }

  // 안전망: 화면 밖이거나 매우 높은 곳에 끼어 있는 별(tier 0)은 자동 제거
  // (시각적으로 안 보이는 작은 공이 카운트를 트리거하는 케이스 방지)
  // ※ tier 0(별)에만 적용 — 큰 별자리가 병합 반동으로 잠깐 튀었다고 삭제되면
  //   점수/진행이 사라지므로 작은 별만 정리한다.
  for (const body of Array.from(droppedBodies)) {
    if (!body || !body.position) continue;
    if (body.tier !== 0) continue;
    const escaped = body.position.y < -10 || body.position.x < -50 || body.position.x > WIDTH + 50;
    if (escaped) {
      droppedBodies.delete(body);
      World.remove(world, body);
    }
  }
}

// 데드라인 카운트다운 UI
const deadlineCountdownEl = document.getElementById('deadlineCountdown');
function updateDeadlineCountdown() {
  if (deadLineEnterTime === null || isGameOver) {
    deadlineCountdownEl.classList.remove('show');
    return;
  }
  const remain = Math.max(0, (DEAD_LINE_GRACE_MS - (performance.now() - deadLineEnterTime)) / 1000);
  deadlineCountdownEl.textContent = remain.toFixed(1);
  deadlineCountdownEl.classList.add('show');
}

function triggerGameOver() {
  isGameOver = true;
  // 게임오버 순간의 화면 상태를 그대로 동결 (어떤 공이 침범했는지 명확히 보이게)
  stopPhysicsLoop();
  finalScoreEl.textContent = score;
  // 신기록: 이번 판 시작 시점 최고점을 "초과"했을 때만 (동점은 제외)
  const isNewBest = score > bestScoreAtGameStart && score > 0;
  newBestMsg.style.display = isNewBest ? 'block' : 'none';
  newBestMsg.textContent = t('newBest');
  // 어려움 모드에서 클리어와 함께 게임오버된 경우: GAME OVER → 🎉 클리어!
  const gameOverHeader = document.querySelector('#gameOverOverlay h2');
  if (gameOverHeader) {
    if ((currentDifficulty === 'hard' || currentDifficulty === 'hell') && _clearedThisGame) {
      gameOverHeader.textContent = t('clearTitle');
      gameOverHeader.style.color = '#FFD700';
    } else {
      gameOverHeader.textContent = t('gameOver');
      gameOverHeader.style.color = '#FF6B6B';
    }
  }
  gameOverOverlay.classList.add('show');
  sndGameOver();
  addShake(12);
  // 통계 누적 (게임 종료 시점)
  stats.totalGames++;
  stats.totalScore += score;
  // 플레이 시간 누적
  const elapsedSec = Math.max(0, (performance.now() - _gameStartTime) / 1000);
  stats.totalPlayTimeSec = (stats.totalPlayTimeSec || 0) + elapsedSec;
  // 최장 콤보 갱신
  if (_maxComboThisGame > (stats.maxComboEver || 0)) stats.maxComboEver = _maxComboThisGame;
  // 신기록 갱신 카운트 (시작 시점 최고점을 초과한 경우에만)
  if (isNewBest) stats.newBestCount = (stats.newBestCount || 0) + 1;
  // 난이도별 통계
  stats.bestByDiff = stats.bestByDiff || {};
  stats.scoreSumByDiff = stats.scoreSumByDiff || {};
  stats.attemptsByDiff = stats.attemptsByDiff || {};
  stats.bestByDiff[currentDifficulty] = Math.max(stats.bestByDiff[currentDifficulty] || 0, score);
  stats.scoreSumByDiff[currentDifficulty] = (stats.scoreSumByDiff[currentDifficulty] || 0) + score;
  stats.attemptsByDiff[currentDifficulty] = (stats.attemptsByDiff[currentDifficulty] || 0) + 1;
  // 헬 모드 경고 누적
  if (currentDifficulty === 'hell') stats.hellWarningTotal = (stats.hellWarningTotal || 0) + hellWarnings;
  // 마지막 플레이 날짜 (오늘 날짜, 로컬 시간대)
  const today = localDateStr();
  if (!stats.firstPlayDate) stats.firstPlayDate = today;
  stats.lastPlayDate = today;
  saveStats();
  // 점수 업적
  if (score >= 1000)   unlockAchievement('score1k');
  if (score >= 10000)  unlockAchievement('score10k');
  if (score >= 40000)  unlockAchievement('score40k');
  if (score >= 80000)  unlockAchievement('score80k');
  // 누적 점수 업적
  if (stats.totalScore >= 100000)   unlockAchievement('score100k');
  if (stats.totalScore >= 1000000)  unlockAchievement('millionScore');
  // 백전노장: 100판 / 진정한 백전노장: 1000판
  if (stats.totalGames >= 100)  unlockAchievement('play100');
  if (stats.totalGames >= 1000) unlockAchievement('trueVeteran');
  // 24시간: 누적 플레이 시간 86,400초
  if (stats.totalPlayTimeSec >= 86400) unlockAchievement('day24');
  // 합치기 마니아: 누적 합치기 10,000회
  if (stats.totalMerges >= 10000) unlockAchievement('mergeMania');
  // 거북이: 1시간 이상 한 게임 + 거북이×3 카운트
  if (elapsedSec >= 3600) {
    unlockAchievement('turtle60');
    stats.turtleHourCount = (stats.turtleHourCount || 0) + 1;
    saveStats();
    if (stats.turtleHourCount >= 3) unlockAchievement('turtleX3');
  }
  // 첫 패배
  unlockAchievement('firstGameOver');
  // 랭킹 자동 등록 (저장된 프로필로)
  onGameOverSubmit();
}

// ---------------- 일시정지 ----------------
function pauseGame() {
  if (isGameOver || isPaused) return;
  isPaused = true;
  cancelBlackholeTargeting(); // 타겟팅 켠 채 일시정지하면 잔존하므로 정리
  _pausedThisGame = true; // 무위 업적 자격 박탈
  _pauseCountThisGame++;
  if (_pauseCountThisGame >= 10) unlockAchievement('carefulType');
  // 헬 모드 낙하 타이머 일시정지 — 남은 시간 보관
  if (dropTimerActive && hellDropDeadline !== null) {
    _hellRemainingOnPause = hellDropDeadline - performance.now();
  }
  stopPhysicsLoop();
  pauseBtn.textContent = '▶';
}
function resumeGame() {
  if (isGameOver || !isPaused) return;
  isPaused = false;
  // 헬 모드 낙하 타이머 재개 — 보관된 남은 시간으로 deadline 재설정
  if (dropTimerActive && _hellRemainingOnPause !== null) {
    hellDropDeadline = performance.now() + _hellRemainingOnPause;
    _hellRemainingOnPause = null;
  }
  startPhysicsLoop();
  pauseBtn.textContent = '⏸';
}
function togglePause() {
  if (isGameOver) return;
  // 일시정지 버튼은 일시정지 메뉴를 띄우는 역할 (재개는 메뉴 안의 버튼으로)
  if (!isPaused) {
    pauseGame();
    openPauseMenu();
  } else {
    // 이미 일시정지된 상태에서 다시 누르면 메뉴 토글
    if (document.getElementById('pauseModal').classList.contains('show')) {
      closeModal(document.getElementById('pauseModal'));
      resumeGame();
    } else {
      openPauseMenu();
    }
  }
}
pauseBtn.addEventListener('click', togglePause);

// ---------------- 블랙홀 아이템 (타겟팅 모드) ----------------
// 버튼 클릭 → 타겟팅 모드 활성화 → 캔버스에서 별을 클릭하면 그 별 제거
let blackholeTargeting = false;
// 타겟팅 모드 강제 해제 (일시정지/메인 이동 등에서 잔존 UI 정리)
function cancelBlackholeTargeting() {
  blackholeTargeting = false;
  blackholeBtn.classList.remove('targeting');
  container.classList.remove('targeting');
}
function activateBlackholeTargeting() {
  if (isGameOver || isPaused) return;
  const cfg = DIFFICULTIES[currentDifficulty];
  // 쿨타임 체크 (cd가 0이면 무시)
  const now = performance.now();
  if (cfg.blackholeCd > 0 && now - lastBlackholeTime < cfg.blackholeCd) return;
  // 횟수 체크 (-1 = 무제한)
  if (cfg.blackholeMax !== -1 && blackholeUses <= 0) return;
  blackholeTargeting = !blackholeTargeting;
  blackholeBtn.classList.toggle('targeting', blackholeTargeting);
  container.classList.toggle('targeting', blackholeTargeting);
}

// 캔버스에서 클릭한 위치의 별을 찾아 제거
function tryBlackholeRemoveAt(x, y) {
  const bodies = Composite.allBodies(world).filter(b => b.label === 'star');
  // 클릭 좌표 위에 있는 별 (가장 위에 그려진 = 마지막에 추가된 우선)
  let target = null;
  for (let i = bodies.length - 1; i >= 0; i--) {
    const b = bodies[i];
    const dx = x - b.position.x;
    const dy = y - b.position.y;
    if (Math.sqrt(dx * dx + dy * dy) <= TIERS[b.tier].radius) {
      target = b; break;
    }
  }
  if (!target) return false;
  // 자해 업적: 페가수스(tier 7) 이상 자해
  if (target.tier >= 7) unlockAchievement('selfHarm');
  // 블랙홀 마스터: 큰곰(tier 8) 이상 제거
  if (target.tier >= 8) unlockAchievement('blackholeMaster');
  // 제거 + 이펙트
  spawnMergeParticles(target.position.x, target.position.y, TIERS[target.tier].color);
  target._removed = true;
  droppedBodies.delete(target);
  World.remove(world, target);
  score += (target.tier + 1) * 5;
  updateScoreUI();
  ensureAudio();
  sndBlackhole();
  addShake(6);
  // 사용 처리: 쿨타임 + 횟수 차감
  lastBlackholeTime = performance.now();
  const cfg = DIFFICULTIES[currentDifficulty];
  if (cfg.blackholeMax !== -1) blackholeUses = Math.max(0, blackholeUses - 1);
  _blackholeUsedThisGame = true;
  // 블랙홀 사용 횟수 = 제거한 별 수 (동일 카운터)
  stats.blackholeUseCount = (stats.blackholeUseCount || 0) + 1;
  saveStats();
  // 타겟팅 모드 종료
  blackholeTargeting = false;
  blackholeBtn.classList.remove('targeting');
  container.classList.remove('targeting');
  return true;
}

blackholeBtn.addEventListener('click', activateBlackholeTargeting);

function updateBlackholeBtn() {
  const cfg = DIFFICULTIES[currentDifficulty] || DIFFICULTIES.medium;
  const cdRemain = cfg.blackholeCd - (performance.now() - lastBlackholeTime);
  const cdActive = cfg.blackholeCd > 0 && cdRemain > 0;
  const usesExhausted = (cfg.blackholeMax !== -1) && blackholeUses <= 0;
  blackholeBtn.disabled = isGameOver || isPaused || cdActive || usesExhausted;
  // 표시 텍스트
  let suffix = '';
  if (cdActive) {
    suffix = `(${Math.ceil(cdRemain / 1000)}s)`;
  } else if (cfg.blackholeMax === -1) {
    suffix = ''; // 무제한
  } else {
    suffix = `x${blackholeUses}`;
  }
  blackholeCdEl.textContent = suffix;
  requestAnimationFrame(updateBlackholeBtn);
}
updateBlackholeBtn();

// ---------------- 재시작 ----------------
function resetGame() {
  if (engine) {
    Events.off(engine, 'collisionStart', handleCollision);
    Events.off(engine, 'afterUpdate', handleAfterUpdate);
    stopPhysicsLoop();
    World.clear(engine.world, false);
    Engine.clear(engine);
  }
  score = 0;
  bestScoreAtGameStart = bestScore; // 이번 판 시작 시점 최고점 스냅샷
  lastDropTime = 0;
  // 난이도 적용
  const cfg = DIFFICULTIES[currentDifficulty] || DIFFICULTIES.medium;
  nextQueue = [];
  for (let i = 0; i < Math.max(1, cfg.nextCount); i++) nextQueue.push(randomDropTier());
  // 첫 떨어뜨릴 공
  nextTier = randomDropTier();
  blackholeUses = cfg.blackholeMax === -1 ? -1 : cfg.blackholeMax;
  hellWarnings = 0;
  hellDropDeadline = null;
  _hellRemainingOnPause = null;
  dropTimerActive = false;

// ---------------- 결과 이미지 공유 ----------------
function generateResultImage() {
  const W = 600, H = 1000;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const cc = c.getContext('2d');

  // 배경 그라디언트
  const grad = cc.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0b1029');
  grad.addColorStop(0.5, '#1a1f4b');
  grad.addColorStop(1, '#2d1b4e');
  cc.fillStyle = grad;
  cc.fillRect(0, 0, W, H);

  // 별 배경
  cc.fillStyle = '#fff';
  for (let i = 0; i < 150; i++) {
    cc.globalAlpha = Math.random() * 0.6 + 0.2;
    cc.beginPath();
    cc.arc(Math.random() * W, Math.random() * H, Math.random() * 1.5 + 0.3, 0, Math.PI * 2);
    cc.fill();
  }
  cc.globalAlpha = 1;

  // 타이틀
  cc.fillStyle = '#FFD700';
  cc.font = 'bold 36px sans-serif';
  cc.textAlign = 'center';
  cc.shadowColor = 'rgba(255,215,0,0.6)';
  cc.shadowBlur = 18;
  cc.fillText(t('shareTitle'), W/2, 60);
  cc.shadowBlur = 0;

  // 클리어 표시
  if (_clearedThisGame) {
    cc.fillStyle = '#FFD700';
    cc.font = 'bold 26px sans-serif';
    cc.fillText(t('shareCleared'), W/2, 100);
  }

  // 점수
  cc.fillStyle = '#fff';
  cc.font = 'bold 72px sans-serif';
  cc.shadowColor = '#FFD700';
  cc.shadowBlur = 18;
  cc.fillText(score.toString(), W/2, 175);
  cc.shadowBlur = 0;
  cc.font = 'bold 18px sans-serif';
  cc.fillStyle = 'rgba(255,255,255,0.7)';
  cc.fillText('SCORE', W/2, 205);

  // === 난이도 배지 + 티어 배지 (가로 나란히) ===
  const diffMap = { easy: 'diffEasy', medium: 'diffMedium', hard: 'diffHard', hell: 'diffHell' };
  const diffLabel = t(diffMap[currentDifficulty] || 'diffMedium');
  const diffColors = { easy: '#2e7d32', medium: '#f9a825', hard: '#ef6c00', hell: '#c2185b' };
  const dCol = diffColors[currentDifficulty] || '#888';
  const groupY = 230, groupH = 34;
  const diffBadgeW = 120;
  const tierBadgeW = 150;
  const gapBetween = 10;
  const groupTotalW = diffBadgeW + gapBetween + tierBadgeW;
  const groupStartX = (W - groupTotalW) / 2;

  // 난이도 배지
  cc.fillStyle = dCol;
  cc.beginPath();
  cc.roundRect(groupStartX, groupY, diffBadgeW, groupH, 17);
  cc.fill();
  cc.fillStyle = currentDifficulty === 'medium' ? '#000' : '#fff';
  cc.font = 'bold 16px sans-serif';
  cc.textBaseline = 'middle';
  cc.textAlign = 'center';
  cc.fillText(diffLabel, groupStartX + diffBadgeW/2, groupY + groupH/2);

  // 티어 배지 (현재 트로피 티어)
  const tierInfo = (typeof getCurrentTier === 'function') ? getCurrentTier() : null;
  if (tierInfo) {
    const tierColorMap = {
      iron:     ['#495057', '#868e96', '#fff'],
      bronze:   ['#7f4f1a', '#cd7f32', '#fff'],
      silver:   ['#8a8a8a', '#d8d8d8', '#1a1a1a'],
      gold:     ['#c89400', '#ffd700', '#1a1a1a'],
      platinum: ['#a8c0c8', '#e5f4f8', '#1a1a1a'],
      emerald:  ['#1e8449', '#50c878', '#fff'],
      diamond:  ['#4dc8e8', '#b9f2ff', '#0a3a4a'],
      master:   ['#ff1493', '#4b0082', '#fff'],
    };
    const tcfg = tierColorMap[tierInfo.tier.id] || tierColorMap.iron;
    const tx = groupStartX + diffBadgeW + gapBetween;
    const tg = cc.createLinearGradient(tx, 0, tx + tierBadgeW, 0);
    tg.addColorStop(0, tcfg[0]);
    tg.addColorStop(1, tcfg[1]);
    cc.fillStyle = tg;
    cc.beginPath();
    cc.roundRect(tx, groupY, tierBadgeW, groupH, 17);
    cc.fill();
    // 마스터 티어는 외곽 글로우 추가
    if (tierInfo.tier.id === 'master') {
      cc.shadowColor = '#ff1493';
      cc.shadowBlur = 14;
      cc.beginPath();
      cc.roundRect(tx, groupY, tierBadgeW, groupH, 17);
      cc.fill();
      cc.shadowBlur = 0;
    }
    cc.fillStyle = tcfg[2];
    cc.font = 'bold 15px sans-serif';
    const tierLabel = (t('tierName_' + tierInfo.tier.id) || tierInfo.tier.id);
    cc.fillText(tierInfo.tier.icon + '  ' + tierLabel, tx + tierBadgeW/2, groupY + groupH/2);
  }
  cc.textBaseline = 'alphabetic';
  cc.textAlign = 'center';

  // === 게임오버 순간 캔버스 스냅샷 ===
  // 메인 게임 캔버스(현재 화면 그대로)를 액자에 담아 가운데에 표시
  if (typeof canvas !== 'undefined' && canvas) {
    const sw = 320, sh = 480;             // 2:3 비율 유지
    const sx = (W - sw) / 2, sy = 290;
    // 액자 음영 + 황금 테두리
    cc.fillStyle = 'rgba(0,0,0,0.5)';
    cc.fillRect(sx - 8, sy - 8, sw + 16, sh + 16);
    cc.strokeStyle = 'rgba(255,215,0,0.55)';
    cc.lineWidth = 2;
    cc.strokeRect(sx - 6, sy - 6, sw + 12, sh + 12);
    try {
      cc.drawImage(canvas, sx, sy, sw, sh);
    } catch (e) {
      // 어떤 사유로 캡처 실패 시 무시 (보수적)
    }
  }

  // 도달한 별자리
  cc.fillStyle = '#fff';
  cc.font = '15px sans-serif';
  cc.textAlign = 'center';
  cc.fillText(t('shareReachedTiers'), W/2, 805);
  const reachedList = [];
  for (let i = 1; i < TIERS.length; i++) {
    if (unlockedTiers.has(i)) reachedList.push(i);
  }
  const cellSize = Math.min(46, (W - 40) / Math.max(reachedList.length, 1));
  const totalW = reachedList.length * cellSize;
  const startX = (W - totalW) / 2 + cellSize / 2;
  for (let i = 0; i < reachedList.length; i++) {
    const tier = reachedList[i];
    const x = startX + i * cellSize;
    const y = 845;
    const tmp = document.createElement('canvas');
    tmp.width = cellSize - 4; tmp.height = cellSize - 4;
    drawSlotCanvas(tmp, tier);
    cc.drawImage(tmp, x - cellSize/2, y - cellSize/2, cellSize - 4, cellSize - 4);
  }

  // 통계 (한 줄로)
  cc.fillStyle = '#fff';
  cc.font = '15px sans-serif';
  cc.fillText(`🔥 ${t('shareMaxCombo')} ${_maxComboThisGame}  ·  ✨ ${t('shareTotalMerges')} ${_mergeCountThisGame}`, W/2, 905);
  if (stats.consecutivePlayDays >= 2) {
    cc.fillStyle = '#FF6B35';
    cc.fillText(`🔥 ${stats.consecutivePlayDays}${t('streakSuffix')}`, W/2, 935);
  }

  // 워터마크
  cc.fillStyle = 'rgba(255,255,255,0.45)';
  cc.font = '14px sans-serif';
  cc.fillText('🌟 ' + t('title'), W/2, H - 22);

  return c;
}

async function shareResult() {
  const canvas = generateResultImage();
  // Web Share API 시도 (모바일에서 가능)
  try {
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    if (!blob) throw new Error('blob fail');
    const file = new File([blob], 'star-merge-result.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: t('shareTitle'),
        text: `${score} ${t('shareScoreText')}!`,
      });
      return;
    }
  } catch (e) {
    // 사용자가 취소하거나 미지원인 경우 다음 폴백으로
  }
  // 폴백: 새 창에 이미지 띄움 (사용자가 길게 눌러 저장)
  const dataUrl = canvas.toDataURL('image/png');
  const w = window.open();
  if (w) {
    // 주의: Live Server 등 일부 도구가 HTML의 닫는 body 태그 문자열을 보고
    // 자동으로 스크립트를 그 앞에 주입한다. 그래서 여기서 close-body / close-html을
    // 문자 리터럴로 그대로 두지 않고 동적으로 조립해서 충돌을 피한다.
    const closeTag = (n) => '<' + '/' + n + '>';
    const html =
      '<' + 'html><head><title>' + t('shareTitle') + closeTag('title') + closeTag('head') +
      '<body style="margin:0;background:#0b1029;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#fff;font-family:sans-serif;">' +
      '<p style="padding:12px;text-align:center;">' + t('shareUnsupportedFallback') + closeTag('p') +
      '<img src="' + dataUrl + '" style="max-width:100%;height:auto;">' +
      closeTag('body') + closeTag('html');
    w.document.write(html);
  }
}
const shareBtn = document.getElementById('shareBtn');
if (shareBtn) shareBtn.addEventListener('click', shareResult);

// ---------------- 헬 모드 타이머 ----------------
function resetHellDropTimer() {
  const cfg = DIFFICULTIES[currentDifficulty];
  if (!cfg || cfg.dropTimer <= 0) {
    dropTimerActive = false;
    hellDropDeadline = null;
    hellBarEl.classList.remove('active');
    return;
  }
  dropTimerActive = true;
  hellDropDeadline = performance.now() + cfg.dropTimer;
  hellBarEl.classList.add('active');
}
function updateHellWarnDots() {
  const dots = hellWarnsEl.querySelectorAll('.warn-dot');
  dots.forEach((d, i) => d.classList.toggle('on', i < hellWarnings));
}
function tickHellTimer() {
  if (!dropTimerActive || isPaused || isGameOver) {
    requestAnimationFrame(tickHellTimer);
    return;
  }
  const cfg = DIFFICULTIES[currentDifficulty];
  if (!cfg || cfg.dropTimer <= 0) {
    requestAnimationFrame(tickHellTimer);
    return;
  }
  const now = performance.now();
  let remain = (hellDropDeadline - now) / 1000;
  if (remain <= 0) {
    // 시간 초과: 경고 누적
    hellWarnings++;
    updateHellWarnDots();
    if (hellWarnings >= 3) {
      triggerGameOver();
      requestAnimationFrame(tickHellTimer);
      return;
    }
    // 다음 시도 위해 타이머 재시작
    hellDropDeadline = now + cfg.dropTimer;
    remain = cfg.dropTimer / 1000;
    addShake(5);
  }
  hellTimerEl.textContent = remain.toFixed(1) + 's';
  hellTimerEl.classList.toggle('danger', remain <= 1.5);
  requestAnimationFrame(tickHellTimer);
}
tickHellTimer();

// ---------------- 클리어 추적 ----------------
// 난이도별 클리어 조건 (도달해야 하는 tier index)
//   쉬움 → 큰곰(8), 중간 → 처녀(9), 어려움 → 바다뱀(10), 헬 → 바다뱀(10)
const CLEAR_TIER = { easy: 8, medium: 9, hard: 10, hell: 10 };
let _clearedThisGame = false; // 한 게임 내 중복 카운트 방지
let _blackholeUsedThisGame = false;
let _gameStartTime = 0;
// 한 게임 내 추적 (업적/통계용)
let _maxComboThisGame = 0;
let _mergeCountThisGame = 0;
let _deadlineTriggeredThisGame = false; // 데드라인 카운트가 한 번이라도 시작되면 true
let _pausedThisGame = false;
let _recentMergeTimes = [];        // 최근 병합 타임스탬프 (비트박스 판정용)
// V2 per-game 추적
let _pauseCountThisGame = 0;       // 일시정지 횟수 (carefulType)
let _firstDrops = [];              // 첫 5번 드롭한 tier 배열 (gambler)
let _leftDropsThisGame = 0;        // 좌측 드롭 횟수 (oneSidedDrop)
let _rightDropsThisGame = 0;       // 우측 드롭 횟수
let _hasFirstDropped = false;      // 첫 드롭 여부 (skyWatcher)
let _lastDropTimeThisGame = 0;     // 마지막 드롭 시각 (passiveType)
let _maxConcurrentBalls = 0;       // 동시 최대 공 수 (minimalist 위반 체크)
let _mergesThisDrop = 0;           // 직전 낙하 1회로 발생한 연쇄 병합 수 (cascade)
function checkClearedDifficulty(reachedTier) {
  if (_clearedThisGame) return;
  const need = CLEAR_TIER[currentDifficulty];
  if (reachedTier < need) return;
  if (!stats.cleared) stats.cleared = {};
  // 클리어 횟수 누적 (boolean이었던 기존값 호환)
  const prev = stats.cleared[currentDifficulty];
  const prevCount = (typeof prev === 'number') ? prev : (prev ? 1 : 0);
  stats.cleared[currentDifficulty] = prevCount + 1;
  _clearedThisGame = true;
  saveStats();
  // 난이도별 클리어 업적
  const clearAchMap = { easy: 'easyClear', medium: 'mediumClear', hard: 'hardClear', hell: 'hellClear' };
  if (clearAchMap[currentDifficulty]) unlockAchievement(clearAchMap[currentDifficulty]);
  // 무결점 헬: 헬 모드를 낙하 경고 0회로 클리어
  if (currentDifficulty === 'hell' && hellWarnings === 0) unlockAchievement('hellPerfect');
  // 모든 난이도 클리어
  if (diffCleared('easy') && diffCleared('medium') && diffCleared('hard') && diffCleared('hell')) {
    unlockAchievement('allCleared');
  }
  // 부가 업적: 블랙홀 미사용 클리어, 스피드런(3분 이내)
  if (!_blackholeUsedThisGame) unlockAchievement('noBlackhole');
  const elapsedSec = (performance.now() - _gameStartTime) / 1000;
  if (elapsedSec <= 480) unlockAchievement('speedy');           // 8분 이내
  // 한 방 컷: 데드라인 카운트 한 번도 안 됨
  if (!_deadlineTriggeredThisGame) unlockAchievement('noDeadline');
  // 무위: 일시정지 없이 클리어
  if (!_pausedThisGame) unlockAchievement('noPause');
  // 아침형 인간: 6시~9시 사이 클리어
  // 야행성: 자정~새벽 6시 사이 클리어
  // 한 주가 다 지나갔네: 일요일 22시~월요일 4시 (주말 끝~월요일 새벽)
  const _now = new Date();
  const hour = _now.getHours();
  const day = _now.getDay(); // 0=일, 1=월
  if (hour >= 6 && hour < 9) unlockAchievement('morningPerson');
  if (hour >= 0 && hour < 6) unlockAchievement('nightOwl');
  if ((day === 0 && hour >= 22) || (day === 1 && hour < 4)) unlockAchievement('weekendOver');
  // 눈치 빠른: 데드라인 카운트 발동 후 클리어
  if (_deadlineTriggeredThisGame) unlockAchievement('quickEye');
  // 미니멀리스트: 한 게임 동시 공 5개 이하 + 클리어
  if (_maxConcurrentBalls > 0 && _maxConcurrentBalls <= 5) unlockAchievement('minimalist');
  // 침묵의 챔피언: 사운드 OFF 클리어 누적 3회
  if (!soundEnabled) {
    stats.silentClearCount = (stats.silentClearCount || 0) + 1;
    if (stats.silentClearCount >= 3) unlockAchievement('silentChamp');
  }
  // 외국인: 영어 클리어 3회 / 다국어 마스터: 한·영 모두
  if (currentLang === 'en') {
    stats.englishClearCount = (stats.englishClearCount || 0) + 1;
    if (stats.englishClearCount >= 3) unlockAchievement('foreigner');
  } else {
    stats.koreanClearCount = (stats.koreanClearCount || 0) + 1;
  }
  if ((stats.englishClearCount || 0) >= 1 && (stats.koreanClearCount || 0) >= 1) {
    unlockAchievement('multiLang');
  }
  saveStats();
  // 클리어 최단 시간 / 최단 병합 수
  stats.clearTimeBest = stats.clearTimeBest || {};
  stats.clearMinMerges = stats.clearMinMerges || {};
  const elapsedMs = elapsedSec * 1000;
  if (!stats.clearTimeBest[currentDifficulty] || elapsedMs < stats.clearTimeBest[currentDifficulty]) {
    stats.clearTimeBest[currentDifficulty] = elapsedMs;
  }
  if (!stats.clearMinMerges[currentDifficulty] || _mergeCountThisGame < stats.clearMinMerges[currentDifficulty]) {
    stats.clearMinMerges[currentDifficulty] = _mergeCountThisGame;
  }
  saveStats();
  // 스피드런 마스터: 모든 4난이도 베스트 시간의 합이 1시간(3,600,000ms) 이하
  const T = stats.clearTimeBest;
  if (T.easy && T.medium && T.hard && T.hell) {
    const totalMs = T.easy + T.medium + T.hard + T.hell;
    if (totalMs <= 3600000) unlockAchievement('speedrunMaster');
  }
  // 난이도별 클리어 연출
  // - 쉬움/중간: 클리어 팝업 (메인으로 / 계속하기)
  // - 어려움: 화면 가운데 토스트 (오버사이즈 바다뱀이 곧 게임오버를 트리거)
  // - 헬: 토스트 (게임은 계속 진행)
  if (currentDifficulty === 'easy' || currentDifficulty === 'medium') {
    openClearModal(currentDifficulty);
  } else {
    showClearToast();
  }
}

// 클리어 팝업 (쉬움/중간)
function openClearModal(difficulty) {

function diffCleared(d) {
  const v = stats.cleared && stats.cleared[d];
  if (typeof v === 'number') return v > 0;
  return !!v;
}
function diffClearCount(d) {
  const v = stats.cleared && stats.cleared[d];
  if (typeof v === 'number') return v;
  return v ? 1 : 0;
}
function isAllNonHellCleared() {
  return diffCleared('easy') && diffCleared('medium') && diffCleared('hard');
}
function isHellUnlocked() { return isAllNonHellCleared(); }
// 연속 플레이 추적
// 로컬(기기) 시간대 기준 YYYY-MM-DD — toISOString()은 UTC라 한국 새벽(0~9시) 플레이가
// 전날로 기록되어 연속 접속이 끊기는 버그가 있어 로컬 날짜로 계산한다.
function localDateStr(d = new Date()) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function dateDiffDays(a, b) {
  const da = new Date(a + 'T00:00:00');
  const db = new Date(b + 'T00:00:00');
  return Math.round((db - da) / (1000 * 60 * 60 * 24));
}
// 표시용 "유효" 연속일수 — 저장값은 게임 시작 때만 갱신되므로, 시작화면에서는
// 마지막 플레이가 오늘(0)/어제(1)면 저장값 유지, 하루 이상 비웠으면 끊긴 것으로 0 표시
function liveStreakDays() {
  const last = stats.lastPlayDate;
  if (!last) return 0;
  const d = dateDiffDays(last, localDateStr());
  return d <= 1 ? (stats.consecutivePlayDays || 0) : 0;
}
function bumpStreakOnGameStart() {
  const today = localDateStr();
  if (!stats.firstPlayDate) stats.firstPlayDate = today;
  const last = stats.lastPlayDate;
  if (!last) {
    stats.consecutivePlayDays = 1;
  } else if (last === today) {
    // 같은 날 여러 판: 변화 없음
  } else {
    const diff = dateDiffDays(last, today);
    if (diff === 1) {
      stats.consecutivePlayDays = (stats.consecutivePlayDays || 0) + 1;
    } else if (diff > 1) {
      stats.consecutivePlayDays = 1; // 끊김
    }
  }
  stats.lastPlayDate = today;
  saveStats();
  // 연속 플레이 업적
  if (stats.consecutivePlayDays >= 3)  unlockAchievement('streak3');
  if (stats.consecutivePlayDays >= 7)  unlockAchievement('streak7');
  if (stats.consecutivePlayDays >= 28) unlockAchievement('streak28');
  if (stats.consecutivePlayDays >= 100) unlockAchievement('centurion');
  // 1주년: 첫 플레이 후 365일 경과
  if (stats.firstPlayDate) {
    const diff = dateDiffDays(stats.firstPlayDate, today);
    if (diff >= 365) unlockAchievement('anniversary');
  }
  updateStreakDisplay();
}

const startBgCanvas = document.getElementById('startBgCanvas');
const startBgCtx = startBgCanvas.getContext('2d');
let startBgStars = [];
function resizeStartBg() {
  startBgCanvas.width = window.innerWidth;
  startBgCanvas.height = window.innerHeight;
  startBgStars = [];
  for (let i = 0; i < 80; i++) {
    startBgStars.push({
      x: Math.random() * startBgCanvas.width,
      y: Math.random() * startBgCanvas.height,
      r: Math.random() * 1.5 + 0.4,
      a: Math.random() * 0.5 + 0.3,
      phase: Math.random() * Math.PI * 2,
      speed: 0.4 + Math.random() * 1.5
    });
  }
}
resizeStartBg();
window.addEventListener('resize', resizeStartBg);
function renderStartBg() {
  if (startScreenEl.classList.contains('hidden')) {
    requestAnimationFrame(renderStartBg);
    return;
  }
  startBgCtx.clearRect(0, 0, startBgCanvas.width, startBgCanvas.height);
  const t = performance.now() / 1000;
  for (const s of startBgStars) {
    const tw = 0.5 + 0.5 * Math.sin(t * s.speed + s.phase);
    startBgCtx.globalAlpha = s.a * (0.5 + 0.5 * tw);
    startBgCtx.fillStyle = '#fff';
    startBgCtx.beginPath();
    startBgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    startBgCtx.fill();
  }
  startBgCtx.globalAlpha = 1;
  requestAnimationFrame(renderStartBg);
}
renderStartBg();

  // 시간 포맷
  const fmtTime = (sec) => {
    if (!sec) return '-';
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = Math.floor(sec % 60);
    return h > 0 ? `${h}h ${m}m` : (m > 0 ? `${m}m ${s}s` : `${s}s`);
  };
  const fmtMs = (ms) => ms ? fmtTime(ms / 1000) : '-';
  const fmtNum = (n) => Number(n || 0).toLocaleString();

  const ctb = stats.clearTimeBest || {};
  const cmm = stats.clearMinMerges || {};
  const bdf = stats.bestByDiff || {};
  const ssd = stats.scoreSumByDiff || {};
  const adf = stats.attemptsByDiff || {};
  const avg = (d) => adf[d] ? Math.floor((ssd[d] || 0) / adf[d]) : 0;

  let html = '';

  // 🏆 티어 hero (종합기록 최상단)

    html += `<div class="rec-streak-hero">🔥 ${stats.consecutivePlayDays}${t('streakSuffix')}</div>`;

  // === Top KPI grid: 핵심 지표 4개 ===

  html += `</div>`;

  // === 첫/마지막 플레이 ===

                   'fuck','shit','bitch','asshole','dick','pussy','nigger','sex','cunt'];
function normalizeName(s) {
  return (s || '').toLowerCase().replace(/\s+/g, '').replace(/[^0-9a-z가-힣ㄱ-ㅎㅏ-ㅣ]/g, '');
}
function validateName(raw) {
  const name = (raw || '').trim();
  if (!name) return { ok: false, err: rt('nameEmpty') };
  if (name.length < 2 || name.length > 12) return { ok: false, err: rt('nameLen') };
  const norm = normalizeName(name);
  for (const w of RK_BANNED) { if (norm.includes(normalizeName(w))) return { ok: false, err: rt('nameBanned') }; }
  return { ok: true, name };
}

// ---- 집계 헬퍼 ----
function bestPerUid(entries, difficulty) {
  const m = new Map();
  for (const e of entries) {
    if (e.difficulty !== difficulty) continue;
    const c = m.get(e.uid);
    if (!c || e.score > c.score) m.set(e.uid, e);
  }
  return [...m.values()].sort((a, b) => b.score - a.score);
}
function schoolAgg(entries, mode) {
  // 1인(uid) 1일(date) 최고점만 반영 → 학교별 합산/최고
  const daily = new Map();
  for (const e of entries) {
    if (!e.school) continue;
    const k = e.uid + '|' + e.date;
    const c = daily.get(k);
    if (!c || e.score > c.score) daily.set(k, { school: e.school, score: e.score });
  }
  const sc = new Map();
  for (const v of daily.values()) {
    const s = sc.get(v.school) || { school: v.school, cum: 0, best: 0 };
    s.cum += v.score; s.best = Math.max(s.best, v.score);
    sc.set(v.school, s);
  }
  return [...sc.values()].sort((a, b) => mode === 'best' ? b.best - a.best : b.cum - a.cum);
}

// Firebase 구현 — 익명 인증 + Firestore (Mock 과 동일 인터페이스)
const RankingFirebase = {
  _db: null, _uid: null, _ready: null, _cache: {},
  _init() {
    if (this._ready) return this._ready;
    this._ready = new Promise((resolve, reject) => {
      if (typeof firebase === 'undefined' || !firebase.initializeApp) { reject(new Error('Firebase SDK 미로드')); return; }
      try {
        if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
        this._db = firebase.firestore();
        firebase.auth().onAuthStateChanged(u => { if (u) { this._uid = u.uid; resolve(); } });
        firebase.auth().signInAnonymously().catch(reject);
      } catch (e) { reject(e); }
    });
    return this._ready;
  },
  async getUid() { await this._init(); return this._uid; },
  async _allForDiff(difficulty) {
    const c = this._cache[difficulty];
    if (c && (Date.now() - c.t) < 4000) return c.v;
    const q = await this._db.collection('scores').where('difficulty', '==', difficulty)
      .orderBy('score', 'desc').limit(1000).get();
    const v = q.docs.map(d => d.data());
    this._cache[difficulty] = { t: Date.now(), v };
    return v;
  },
  async submitScore({ difficulty, score, profile, date }) {
    await this._init();
    const uid = this._uid, db = this._db;
    const pref = db.collection('scores').doc(`${uid}_${difficulty}`);
    await db.runTransaction(async tx => {
      const snap = await tx.get(pref);
      const prev = snap.exists ? (snap.data().score || -1) : -1;
      if (score > prev) {
        tx.set(pref, { uid, name: profile.name, country: profile.country,
          flag: countryByCode(profile.country).flag, school: profile.school || null,
          difficulty, score, updatedAt: Date.now() });
      }
    });
    if (profile.school) {
      const dref = db.collection('dailyBest').doc(`${uid}_${date}`);
      await db.runTransaction(async tx => {
        const snap = await tx.get(dref);
        const prev = snap.exists ? (snap.data().score || -1) : -1;
        if (score > prev) tx.set(dref, { uid, school: profile.school, score, date });
      });
    }
    this._cache = {};
    return await this.myStanding({ difficulty, uid });
  },
  async personalTop({ difficulty, limit = 10 }) { await this._init(); return (await this._allForDiff(difficulty)).slice(0, limit); },
  async myStanding({ difficulty, uid }) {
    await this._init();
    uid = uid || this._uid;
    const all = await this._allForDiff(difficulty);
    const idx = all.findIndex(e => e.uid === uid);
    return idx >= 0 ? { rank: idx + 1, total: all.length, entry: all[idx] } : { rank: null, total: all.length, entry: null };
  },
  async _schoolAgg() {
    const q = await this._db.collection('dailyBest').limit(5000).get();
    const sc = new Map();
    q.forEach(doc => {
      const v = doc.data();
      const s = sc.get(v.school) || { school: v.school, cum: 0, best: 0 };
      s.cum += v.score; s.best = Math.max(s.best, v.score);
      sc.set(v.school, s);
    });
    return [...sc.values()];
  },
  async schoolTop({ mode, limit = 10 }) {
    await this._init();
    return (await this._schoolAgg()).sort((a, b) => mode === 'best' ? b.best - a.best : b.cum - a.cum).slice(0, limit);
  },
  async schoolStanding({ mode, school }) {
    await this._init();
    const agg = (await this._schoolAgg()).sort((a, b) => mode === 'best' ? b.best - a.best : b.cum - a.cum);
    if (!school) return { rank: null, total: agg.length, entry: null };
    const idx = agg.findIndex(s => s.school === school);
    return idx >= 0 ? { rank: idx + 1, total: agg.length, entry: agg[idx] } : { rank: null, total: agg.length, entry: null };
  },
};
const RankingAPI = RANK_USE_FIREBASE ? RankingFirebase : RankingMock;

  if (!query) { schoolListEl.classList.remove('show'); return; }
  const matches = RK_SCHOOL_SAMPLE.filter(s => s.name.includes(query)).slice(0, 8);
  for (const s of matches) {
    const div = document.createElement('div');
    div.className = 'rk-school-item';
    div.innerHTML = `${rkEscape(s.name)}<span class="kind">${s.kind}</span>`;
    div.addEventListener('click', () => { _selectedSchool = s.name; profSchoolEl.value = s.name; schoolListEl.classList.remove('show'); });
    schoolListEl.appendChild(div);
  }
  if (!matches.some(s => s.name === query)) {
    const div = document.createElement('div');
    div.className = 'rk-school-item custom';
    div.textContent = rt('customSchool')(query);
    div.addEventListener('click', () => { _selectedSchool = query; profSchoolEl.value = query; schoolListEl.classList.remove('show'); });
    schoolListEl.appendChild(div);
  }
  schoolListEl.classList.add('show');
}
profSchoolEl.addEventListener('input', e => { _selectedSchool = null; renderSchoolList(e.target.value); });

document.getElementById('profSaveBtn').addEventListener('click', () => {
  const v = validateName(profNameEl.value);
  if (!v.ok) { nameErrEl.textContent = v.err; return; }
  let school = _selectedSchool;
  const typed = profSchoolEl.value.trim();
  if (!school && typed) school = typed; // 검색 선택 안 했어도 입력값 직접 등록 허용
  const p = loadProfile() || {};
  p.uid = p.uid || getOrCreateUID();
  p.name = v.name;
  p.country = profCountryEl.value;
  p.school = school || null;
  if (!p.createdAt) p.createdAt = Date.now();
  p.updatedAt = Date.now();
  saveProfile(p);
  closeModal(profileModal);
  applyRankingLangTexts();
  const cb = _profileOnSaved; _profileOnSaved = null;
  if (cb) cb();
});

// ---- 랭킹 모달 ----
const rankingModal = document.getElementById('rankingModal');
const rankingBody = document.getElementById('rankingBody');
let _rkTab = 'personal', _rkDiff = 'medium', _rkSchoolMode = 'cumulative';

function rkRowHTML(rank, flag, name, sub, score, isMe, idx) {
  const cls = ['rk-row'];
  if (isMe) cls.push('me');
  if (rank === 1) cls.push('top1'); else if (rank === 2) cls.push('top2'); else if (rank === 3) cls.push('top3');
  const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
  const rankCell = medal ? `<div class="rk-rank"><span class="rk-medal">${medal}</span></div>` : `<div class="rk-rank">${rank}</div>`;
  const subHTML = sub ? `<div class="rk-sub">${rkEscape(sub)}</div>` : '';
  return `<div class="${cls.join(' ')}" style="--i:${idx || 0}">${rankCell}<div class="rk-flag">${flag || '🏳️'}</div>` +
         `<div class="rk-name">${rkEscape(name)}${subHTML}</div><div class="rk-score">${rkFmt(score)}</div></div>`;
}
async function renderRankingBody() {
  document.getElementById('rankingTitle').textContent = rt('rankingTitle');
  document.getElementById('rkTabPersonal').textContent = rt('tabPersonal');
  document.getElementById('rkTabSchool').textContent = rt('tabSchool');
  document.getElementById('rankingCloseBtn').textContent = rt('close');
  document.getElementById('rkTabPersonal').classList.toggle('active', _rkTab === 'personal');
  document.getElementById('rkTabSchool').classList.toggle('active', _rkTab === 'school');
  rankingBody.innerHTML = `<div class="rk-empty">⏳</div>`;
  try {
    if (_rkTab === 'personal') await renderPersonalRanking(); else await renderSchoolRanking();
  } catch (e) {
    console.warn('ranking load failed', e);
    rankingBody.innerHTML = `<div class="rk-empty">${rt('loadFail')}</div>`;
  }
}
async function renderPersonalRanking() {
  const diffs = ['easy', 'medium', 'hard', 'hell'];
  const labelMap = { easy: t('diffEasy'), medium: t('diffMedium'), hard: t('diffHard'), hell: t('diffHell') };
  let html = `<div class="rk-subtabs">` + diffs.map(d => `<button class="rk-subtab d-${d} ${d === _rkDiff ? 'active' : ''}" data-d="${d}">${labelMap[d]}</button>`).join('') + `</div>`;
  const uid = await RankingAPI.getUid();
  const top = await RankingAPI.personalTop({ difficulty: _rkDiff, limit: 10 });
  const me = await RankingAPI.myStanding({ difficulty: _rkDiff, uid });
  // 내 기록 카드 (항상 상단)
  if (me.rank) {
    const e = me.entry;
    html += `<div class="rk-mystat"><div class="ms-rank">${me.rank}<small>${rt('rankWord')}</small></div>` +
      `<div class="ms-flag">${e.flag || '🏳️'}</div><div class="ms-info"><div class="ms-name">${rkEscape(e.name)}</div>` +
      `${e.school ? `<div class="ms-sub">${rkEscape(e.school)}</div>` : ''}</div>` +
      `<div class="ms-score">${rkFmt(e.score)}</div></div>`;
  } else {
    html += `<div class="rk-mystat empty"><div class="ms-msg">${rt('noMyRecord')}</div></div>`;
  }
  // 상위 10
  if (top.length === 0) {
    html += `<div class="rk-empty">${rt('noRank')}</div>`;
  } else {
    html += `<div class="rk-list">`;
    top.forEach((e, i) => { html += rkRowHTML(i + 1, e.flag, e.name, e.school, e.score, e.uid === uid, i); });
    html += `</div><div class="rk-count">${rt('totalPlayers')(me.total)}</div>`;
  }
  html += `<div class="rk-mock">${rt('mockNote')}</div>`;
  rankingBody.innerHTML = html;
  rankingBody.querySelectorAll('.rk-subtab').forEach(b => b.addEventListener('click', () => { _rkDiff = b.dataset.d; renderRankingBody(); }));
}
async function renderSchoolRanking() {
  const myP = loadProfile();
  let html = `<div class="rk-subtabs">` +
    `<button class="rk-subtab ${_rkSchoolMode === 'cumulative' ? 'active' : ''}" data-m="cumulative">${rt('schoolCumulative')}</button>` +
    `<button class="rk-subtab ${_rkSchoolMode === 'best' ? 'active' : ''}" data-m="best">${rt('schoolBest')}</button></div>`;
  const list = await RankingAPI.schoolTop({ mode: _rkSchoolMode, limit: 10 });
  const myStanding = await RankingAPI.schoolStanding({ mode: _rkSchoolMode, school: myP && myP.school });
  // 우리 학교 카드
  if (myP && myP.school) {
    if (myStanding.rank) {
      const val = _rkSchoolMode === 'best' ? myStanding.entry.best : myStanding.entry.cum;
      html += `<div class="rk-mystat"><div class="ms-rank">${myStanding.rank}<small>${rt('rankWord')}</small></div>` +
        `<div class="ms-flag">🏫</div><div class="ms-info"><div class="ms-name">${rkEscape(myP.school)}</div><div class="ms-sub">${rt('ourSchool')}</div></div>` +
        `<div class="ms-score">${rkFmt(val)}</div></div>`;
    } else {
      html += `<div class="rk-mystat empty"><div class="ms-msg">${rkEscape(myP.school)} · ${rt('noMyRecord')}</div></div>`;
    }
  } else {
    html += `<div class="rk-mystat empty"><div class="ms-msg">${rt('setSchoolHint')}</div></div>`;
  }
  if (list.length === 0) {
    html += `<div class="rk-empty">${rt('noRank')}</div>`;
  } else {
    html += `<div class="rk-list">`;
    list.forEach((s, i) => {
      const val = _rkSchoolMode === 'best' ? s.best : s.cum;
      const isMine = !!(myP && myP.school === s.school);
      html += rkRowHTML(i + 1, '🏫', s.school, null, val, isMine, i);
    });
    html += `</div><div class="rk-count">${rt('totalSchools')(myStanding.total)}</div>`;
  }
  html += `<div class="rk-mock">${rt('mockNote')}</div>`;
  rankingBody.innerHTML = html;
  rankingBody.querySelectorAll('.rk-subtab').forEach(b => b.addEventListener('click', () => { _rkSchoolMode = b.dataset.m; renderRankingBody(); }));
}
document.getElementById('rkTabPersonal').addEventListener('click', () => { _rkTab = 'personal'; renderRankingBody(); });
document.getElementById('rkTabSchool').addEventListener('click', () => { _rkTab = 'school'; renderRankingBody(); });
function openRankingModal(initialTab) {
  _rkTab = initialTab || 'personal';
  if (currentDifficulty) _rkDiff = currentDifficulty;
  openModal(rankingModal);
  renderRankingBody();
}

// ---- 점수 제출 ----
async function submitCurrentScore() {
  const p = loadProfile();
  if (!p || !p.name || !score || score <= 0) return null;
  try {
    return await RankingAPI.submitScore({ uid: p.uid, difficulty: currentDifficulty, score, profile: p, date: localDateStr() });
  } catch (e) { console.warn('ranking submit failed', e); return null; }
}
// 게임오버 시 자동 등록 (triggerGameOver 끝에서 호출)
function onGameOverSubmit() {
  const rankEl = document.getElementById('gameoverRank');
  if (rankEl) rankEl.style.display = 'none';
  submitCurrentScore().then(res => {
    if (rankEl && res && res.rank) {
      rankEl.textContent = `${rt('registered')} · ${rt('rankIs')(res.rank)}`;
      rankEl.style.display = 'block';
    }
  });
}
// 중앙 토스트 (메인 나가기 등록 피드백 등)
function showRankToast(msg) {
  const toast = document.createElement('div');
  toast.style.cssText = `position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:linear-gradient(135deg,#5e35b1,#311b92); color:#fff; padding:16px 26px;
    border-radius:14px; font-size:16px; font-weight:700; z-index:400;
    box-shadow:0 6px 24px rgba(0,0,0,0.5); text-align:center; max-width:80%;`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 1900);
}

// ---- 시작화면/게임오버 버튼 ----
function applyRankingLangTexts() {
  const pb = document.getElementById('profileBtn'); if (pb) pb.textContent = rt('myProfile');
  const grb = document.getElementById('gameoverRankBtn'); if (grb) grb.textContent = rt('viewRanking');
}
document.getElementById('profileBtn').addEventListener('click', () => openProfileModal());
document.getElementById('gameoverRankBtn').addEventListener('click', () => openRankingModal('personal'));

// ---- 재시작 확인 모달 ----
const restartConfirmModal = document.getElementById('restartConfirmModal');
function openRestartConfirm() {
  document.getElementById('restartWarnTitle').textContent = rt('restartTitle');
  document.getElementById('restartWarnBody').textContent = rt('restartBody');
  document.getElementById('restartCancelBtn').textContent = rt('cancel');
  document.getElementById('restartConfirmBtn').textContent = rt('confirm');
  openModal(restartConfirmModal);
}
document.getElementById('restartConfirmBtn').addEventListener('click', () => {
  closeModal(restartConfirmModal); closeModal(pauseModal); resetGame();
});
document.getElementById('restartCancelBtn').addEventListener('click', () => closeModal(restartConfirmModal));

// ---- 초기화 ----
getOrCreateUID();
seedMockRanking();
applyRankingLangTexts();

// ---------------- 시작 ----------------
preloadAssets().then(() => {
  applyLangUI();
  applySoundUI();
  resetGame();
  // 초기엔 게임 일시정지 상태로 두기 (시작 화면에서)
  stopPhysicsLoop();
  isPaused = true;
  render();
  refreshTierDisplays(); // 초기 티어 표시

  // BGM 자동재생 (브라우저 정책상 사용자 입력 후 시작)
  const startBgm = () => {
    if (soundEnabled && loadedSounds.bgm) loadedSounds.bgm.play().catch(() => {});
    window.removeEventListener('click', startBgm);
    window.removeEventListener('touchstart', startBgm);
    window.removeEventListener('keydown', startBgm);
  };
  window.addEventListener('click', startBgm);
  window.addEventListener('touchstart', startBgm);
  window.addEventListener('keydown', startBgm);
});
</script>
